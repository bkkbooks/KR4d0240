body:
  text: 樂軒集卷八宋陳藻撰䇿問唐藩鎮貞觀十一年以諸王功臣為世襲刺史羣臣論難不已不三年停之而都督復罷于景雲盖尾大之患不可不監于東周亦不可不監于西漢也然天下之患雖循其塗而塞之而事變之來千端百緒旁衝間潰盖非可以一謀止也嗚呼攷唐人未嘗封建而末大之禍乃亟于前車亦豈立國者始謀之不善耶安史既亂肅宗以中材之主而任中興非常之責京都甫平而帝之精力志慮已疲倦矣瓜分南北付授叛将庶幾一夕甘寢否則廓清區宇欲大滿人意尚何時耶然土地人民財賦甲兵皆得而私有則軍知帥將而不知有長安噫藩臣既叛天子矣感召之機速至大厯間而其禆佐已有謀逐主帥自稱節度留後之心自是而降玩為故常朝廷不能明正典刑而猥畀符節圖為姑息茍安之計履霜堅氷而終為李唐社稷之憂噫尚忍言之哉夫周漢之為藩翰者如同姓之親而皆跋扈不軌况唐人授盗賊以兵民之柄乎雖然不得已也勢也安能預為後日計耶故貞元時山東有燕趙叛河南有齊蔡叛階此蜀亦叛吳亦畔肱髀相依而唐號令之所暨者褊矣然元和而後得蜀得吳得蔡得齊收郡縣二百餘城所未能得者惟山東百城耳時可以復髙祖太宗之境土也而唐終不競抑亦天時所至非人力可勝耶噫君如武宗臣如李德裕功業如彼其卑無責也以憲宗之斷裴度之才而亦僅有生氣若何而後可以濟是歟諸君若生于唐其為唐計當何如也願聞經濟之策唐官制唐之官制因于隋所損益可知也其名大易于龍朔而武后又大易之天寳有改者而全復于至德孔子曰名不正則言不順夫易之改之復之名以正而言以順者誰乎且宰相雖宅百揆而唐之名常不正况其他哉貞觀以來以他官居宰相開元而後以宰相領他官此其故何耶噫人主之職論一相而相之職則論百官唐之人主不知論相矣其相果能論官乎且六部屬尚書省矣而又分總于左右丞何耶御史别立臺矣而左右諫議拾遺補闕止分屬于門下中書二省何耶周人之事盡掌于六官唐之六部是也况部皆有屬釐之為二十四此其包括天下之事無遺矣加之以九寺贅也矧因之以五監乎臺一也而院有三察有六何也至衛有十六何所取義常參六參九參其别又如何耶品爵勲階員外置特置同正員檢校兼守制置又何謂也東宫王府古有官屬奚哉七公主之有官屬耶中書舍人參酌獄院御史中丞俄兼戸部此又何制也常侍賓客十其六可罷左右贊善三十其二十可罷李泌常條奏中朝官如是矣外之官冗即此而推如何耶雖然吾之信史然耳書不可盡信史可盡信歟史記同中書門下三品謂起于李勣又謂始于長孫無忌而張文瓘則又三品入銜之所自始也夫記一宰相已舛矣况他官乎幸論唐官制而併訂史疑唐始終治亂世有治亂人事之變天理之常也三代雖有變治常多焉更戰國而至秦否固極矣受之以兩漢如履康莊雖有時不能無疑而承平無事之日常相接也三國而晉晉不五十年而天下成南北之勢又幾三百年而合于隋隋一再傳而唐有之矣三代而下惟漢與唐為盛世唐上接三國西晉南北隋人之後變亂久更天宜悔禍而唐雖歴世二十一歴年二百八十有八而先後内外兵戈相㝷視向者三光五嶽氣分之時殆不能以相遠試舉而言之髙祖資突厥以殱孤隋而創造又皆太宗之功異時突厥責報而建成且必不能為吳泰伯是首事已胎二患也建成既滅于武德之末而突厥又臣于貞觀之初天下自此可謂帖然無憂矣則天立于永徽而李之為武不絶如綫五王討二張于神龍而唐祚反正中宗身履其危宜能不蹈前人之覆轍張柬之等食一下咽已撫床歎憤彈指出血矣景龍之兵三思雖戮而太子重俊亦弗克免韋后葢無恙也臨淄莧夬而相王龍飛太平公主已煽燎原之火矣故宫闈再難而明皇再清自是以徃朝廷安枕不知他變之所由生也漁陽金鼓喧天一鳴而翠華西幸肅宗中興未幾李輔國程元振之禍人作焉代宗嗣立之元年朝義授首而吐蕃長驅已入中原幸而安矣德宗之初設施可觀四海欣躍庶望太平無何李希烈反朱泚反李懐光又反而乗輿播越者葢屢焉元和征討稍强而長慶之主滿謂可以銷兵不戰矣于是乎河北再失而外重之勢成不復返至太和甘露之變而宦官之勢又益張武宣之世雖曰小康亦姑且玩時愒日耳一時大臣以朋黨自相攻擊遑恤其他王仙芝黄巢亂于乾符而四方大擾國本拔矣自後崔裔知藩鎮可以亡宦官豈知朱全忠可以移唐鼎耶嗚呼古今治亂未有如是之數也將天之厄運自曹氏以來迄唐猶未止歟抑人事所召非天時之所關歟文皇斥地開闢未聞或者極盛必亟衰歟由漢而後以唐為首稱者徃徃謂武德貞觀開元耳其德葢有大過人者歟閨門也外國也藩鎮也宦官也朋黨也盗賊也是數患也何皆備見于唐之世歟前後亦有相激而成者歟其為召禍之原者誰歟可以預防歟勢有必至莫得而逆為之計歟尚論前史莫近于唐願聞耳目之所未睹記毋辭焉漢兵制漢初之制有三軍内曰北軍衛尉主之以屯衛宫門者也外曰南軍中尉主之以屯京師十二城門及散居三輔者也又其外曰車騎材官則非布之以郡國而領之以都尉者乎内外雖殊畨上而移屬不知其孰為輕孰為重于斯時也羽林期門八校之屬皆未之前聞郎衛昉于前乎前此矣宫掖門戸光禄勲之所掌也漢光禄勲即向者郎中令正周官宫伯之職宫伯掌王宫士庶子之版漢公卿二千石子弟入主執㦸更直宿衛出充車騎則謂之郎衛而屬之光禄勲是由衛尉而内又有郎衛兵也漢初之軍不止三矣武帝置兵千人從事遊獵漢于是乎作期門期門比之郎衛也自時厥後有七百人者在期門之次漢于是乎作羽林羽林者建章營衛騎之更名也武帝欲養死事者之子孫漢於是乎作孤兒凡此皆天子之親兵也又有所為佽飛者皆無調發之勞與前所謂南北軍以郡國之車騎材官畨移而迭上者絶異是則重内輕外矣又有八校者屬之衛尉乃以分屯外縣不專在長安諸邑將南北軍漸壊而後置此諸軍以補之歟抑南北之外増置之而俾益多歟八校𨽻之衛尉則是曰北軍矣或又以為八校者葢包南北軍言之何歟或又以為漢初止于京城置兵而長安城内六百里未有兵武帝始置之果然歟羽林之補必以天水隴西安定北地上郡西河六郡之良家子無乃拘歟關中居天下三分之一卒然一隅有警則内足以制外漢人所置内兵之制誠善矣雖然外而有變内兵葢不輕調也隴西諸郡專備西羌巴蜀等郡專備西南夷遼東燕齊等郡專備朝鮮㑹稽等郡專備兩粤或步或車騎或水而樓船各隨其方以禦侮兵無遠調糧無遠餉外而郡國之兵制漢人亦善處之矣宣帝之御天下百為精緻者也况兵戎國家之大事漢家善制每輒變之何歟觀其征西羌也發佽飛羽林同官徒弛刑詣金城既失武帝重内兵之意三河潁川沛郡淮陽汝南材官去金城幾何里而亦調發之西伐烏孫乃至調及關東之輕車鋭卒其于漢人處外兵之意又失焉宣帝之調兵如此而威行外國抑乃過于前人又何歟是果軍旅之事未之學不害其為興治禦暴之術歟諸君試與我論兵毋以俎豆為辭周漢兵農分合周之兵農未嘗不分漢之兵農未嘗不合世儒皆謂當周之時兵即農農即兵漢襲秦制始農為農而兵為兵竊恐讀書之未審耳夏殷之禮夫子以文獻不足而致歎班爵之問孟子以諸侯去籍而不詳今而談古之制不得其意而悉取信于其書安得全書而據哉世儒之于周禮也或以為周公書或以為非周公書雖不可盡信然兵農之制寓諸井田亦有大畧可㝷焉且以丘邑論之成方十里則百里之地也去旁加者為溝洫又去其公田則一井八夫六十四井為夫五百一十二所出長轂一乗七十有五人則幾七人而兵一夫也况以王畿方千里論之去其城邑林麓又去其一易再易之田猶有三百萬夫而天子六軍止七萬五千人盖四十夫而以一夫為兵孰謂兵農之不分耶而古者又謂兵農一致何也及觀漢法而得周制焉嗚呼失禮尚求諸野豈其失周制而不可求諸漢乎周漢之制不全判儒生直岐而言之則差矣古今人情一也且悉驅民以為兵夫豈不擾而謂先王為之乎夫漢丞相子不免戍邉不免其賦耳豈非宰相之子賦止戍邉而其餘品官之家則又有他軍需耶大抵漢之調兵縣則更卒邉則繇戍中都則衛士都尉則材官車騎樓船凡四者皆以平民更代為之也西都之馮唐不云乎罷遣衛士必勸以農桑盖民年二十三為正卒五十六免為庶人其為正卒者一歲衛士一歲材官等兵一歲縣更卒一歲邉戍四者惟衛士衣食于縣官其餘孰給之哉縣更者戍邉者亦宜人人身親之縣更者歲一月邉戍者三日月出錢二千其名踐更三日出錢二百其名過更然則役者役賦者賦以意度之材官亦然也周民若彼其多而兵數若是其寡者是必亦合數夫出賦而供一夫之役也漢制亦周之遺豈兵農不分于周而不合于漢耶特井地壊耳今之沿邉土兵役者出丁而坐者供送正周漢之制至于庶民出賦以養兵亦何嘗大異于古是則周之制猶存于漢漢之制猶存于今世之儒生每恨今之不如古何歟尚書周禮本朝官制後人以官制之得失折衷于周禮竊又以周禮之得失而折衷于尚書且尚書周官首之以三公三孤次之以六卿而冢宰盖六卿之長也周禮六卿每二卿則公一人而天官之有太宰非一卿而當二卿者乎今考其所職乃無所不統非後世吏部尚書之比乃宰相事也夫六卿之長者既為宰相則所謂公孤者又何官也書自太保奭而至毛公葢嘗著其六人矣注謂冢宰第一召公領之而終之以司空第六毛公領之其間有所謂畢公者注以為司馬而書又有太保率西方諸侯畢公率東方諸侯則畢公者豈非與召公並為東西二伯乎六卿既兼二伯矣寧不兼三公已乎竊嘗以周禮而折衷于尚書其得者葢如是爾孰謂周禮非周公之典乎然穆王之命太僕正其書一篇丁寧反覆以后之德不德實係乎此葢以其率天子左右侍御僕從之屬切于王身其任為甚重者也周禮自太宰小宰宰夫之後則繼之以宫正宫正而下膳庖酒醢舍幕裘枲等職皆侍御僕從官也然則周禮之宫正即書之太僕正穆王之命其重如此而宫正乃上士為之豈周人命一上士而輒有一篇之書如是耶此以周禮而折衷于尚書不能無疑者也二經所載既相牴牾以後人官制之得失而折衷于周禮果得其當乎夫周禮首入天官而可疑者彰彰矣三百六十屬其疑可既耶恭惟國朝官制葢沿唐舊而或有所更革創立豈無得失詎可不講求其故耶文武兩途樞宻本兵武臣職也用文資正官以充其使太平興國而昉于石熈載何耶既曰使矣而知院淳化之名又昉于張遜等何耶簽書起于何日太平興國而中石熈載同簽書之置治平且自郭逵始矣三司而有副使賈琰則太宗之初也至太平興國間胡為去副使之號而有同判三司侯陟王明之目耶直舍人院太宗初用張洎如以何事而立京官而任堂後雍熈元年李元吉等始何人而置此在内之職其一二大畧然也提㸃刑獄淳化近代所未有而創于太宗皇帝或者以為是司不置可也而副使復立于真宗之朝何耶既而罷之又何也轉運有副使矣而判官之名開寳中許九言又必立于國初何也廣州市舶兼于守臣則自潘美始矣而又以為始于任中師何耶其特置使又始于何時也廣南縣太平興國戸五百以下者止主簿一員兼令尉舊制也而續又有縣令之置非冗耶此在外之官其一二可議者然也演而伸之觸類而長之所損益葢多也元豐政和之所定因革當否願悉聞于諸君周禮尚書官制異同周官一書成王在豐所作也首之以三公三孤次之以六卿率屬終之以九牧阜萬民其辭簡其意盡其視天下可指畫于掌中周官立政葢相為表裏者也略公孤而不言但曰王左右常伯常任釋者以為三公六卿其信然歟卿固六也特致意于司徒司馬司空之三者何歟其曰準人非司冦歟不曰司寇而必曰準人何歟酒誥之文猶是爾亦以司徒司馬司空而謂之圻父農父宏父也立政酒誥皆特舉斯三者則冢宰宗伯司冦猶可緩歟洪範八政亦止言其三人且去司馬而言司冦是又何歟三公不備雖難其人周公徃矣召公由保以遷師夫豈不當而卒老于其官將朝廷不陟之歟抑召公確遜之歟成周官制周官序其大畧周禮則演而伸之葢一事也今若判然不相關者何歟卿可兼公于書槩見而公孤之寄為甚重葢在六官上也今地官鄉老二卿則公一人公而可以謂之鄉老歟又可繫之地官歟太師太保而謂之師氏保氏以中下大夫而屬之地官此其輕重之意與周官同歟異歟此又若不相關者然也其他周禮又皆有可疑者焉攷之天官有獸人􅈄人鼈人奚不與衡虞角羽同屬于地官歟天府豈禮官之屬而世婦女史不以𨽻于冢宰而亦在于宗伯之下何歟夏官之挈壺氏胡不處于春官馮相保章之内而弁師胡不置于司服之次歟秋官之屬太失之泛而其甚有硩蔟氏蟈氏之類其果何謂歟冬官闕矣而續以考工記其書真可以補亡而王公論道之數語乃唐虞三代精㣲之訓今使六官全具而有若天施地設然其又何歟比者鑾輿幸學爰命儒臣坐講周官甚盛舉也周官一篇截然井然無一可議然合尚書周禮而紬㝷之則莫能氷釋短檠歲月講求必熟幸發揮焉官制僕射御史侍中後皆以名宰相正名孔子之所重也名浮于實固不可名損于實其可乎正名莫大于官制官制莫大于相臣僕射昉于秦乎僕主役也秦重武官以之而主射事故侍中博士郎皆有僕射若軍屯吏則曰軍屯僕射若永巷則曰永巷僕射名之㣲而職之細已乎成帝置尚書五人以一人為僕射則今僕射非昔之僕射也至東漢而愈隆建安有左右之名矣雖然左主客曹右領祠部蕭齊之制又止是也隋為從二品不既髙矣乎至唐太宗時則為宰相矣然則僕射昉于秦乎前此矣周禮射人二下大夫即秦之僕射乎以僕射之名而加之宰相能不損其實否乎御史大夫亦秦官也及漢因之則為丞相之貳今參知政事是也綏和改元更名大司空司空六卿之下者以名其輔相可乎周禮御史掌邦國都鄙及萬民之治令以賛冢宰是則為宰相之副者尚矣然古者中士八人為之則亦甚㣲矣天官之小宰中大夫二人非乎參預朝政參議朝政參知機務參掌機宻何太宗立號之多乎其後御史又為臺官不知起于何時也御史之名足以名其輔相乎侍中者立政之所謂常伯周禮之所謂太僕也委任漸隆梁為宰輔唐龍朔為左相矣何其復舊之後又曰納言又曰黄門監至天寳又為左相唐之紛紛如此亦皆有由乎向者我孝宗皇帝朝以左右丞相而易去僕射之號善復古也或者又以周之冢宰當今之吏部尚書否乎若以冢宰為吏部尚書則小宰者非參知政事乃其侍郎否乎宰夫又準今之何官也幸鋪陳之以觀經史之醖藉大宗小宗古者大宗之法不可行于後世何哉卿大夫各食虗邑而采地廢焉葢是法也隨井田封建而張弛耳有大宗則有小宗古者庶民無大宗則小宗亦不可得而有也小宗不行初無妨于睦族今人服屬五世而斬小宗之法遷止五世東坡以小宗不行為可惜竊謂百世不遷者既不可復五世之族天下何嘗不合哉第立宗子則嫡庻分爾國家定法如襲爵則有嫡庶之辨如奏補則直論長幼之序此為盡天下之情而合古今之義采地既廢而小宗特立無爵可承徒分嫡庶豈不紛紛無益哉今自兩府而至百姓之家物力雄者則烝嘗田多其後子孫繁庶而其業依律以常存嵗祀不乏每其房族第升一人以為之長雖不曰别子為祖而其實有别子為祖之意雖不立嫡子為宗子而宗子之道常不墜且自公卿而至庶人第有資産皆可為耳况今人烝嘗未始有田者古墳一丘而十數代之子孫歲醵以祭仁義之道著在人心不冺如此東坡奚必過慮哉諸君謂此言何如且併以左氏貳宗戴記有無莫之宗者推廣而具陳之以觀博學筮貞悔之説聞諸洪範洪範雖出于武王箕子而其源自禹然則夏有連山而筮昉于此乎夏未代虞而舜廷有之矣連山未作不知蓍法何如耶其占辭又何如也則是前乎此者可謂八索將止以八卦索之而成六十四歟抑亦已有辭歟不然何以占之也筮之應驗詳于左氏之春秋自懿氏卜妻敬仲至陽虎卜救鄭凡十有三條其十者信若淫巫瞽史也至于陽虎得吉爻而不敢進知其吉在宋而不在已此葢不為私心所昏亦未見其抽關啟鑰之髙論也南蒯叛而枚筮之遇坤之比其辭為黄裳元吉子服惠伯以為雖吉未也且謂易不可以占險人皆疑左氏之誣是書皆出于手非果有舊史而因之信如是則其逹乎蓍之理也逺矣其然乎穆姜嘗遇艮之八史曰是謂艮之隨姜曰有四德者隨而无咎我皆無矣豈隨也哉觀此二者凡所載占驗特前言戯之耳至是而方有實論雖然則其書無乃似非歟非也善為易者不占左氏葢造其域矣或且疵其為淫巫瞽史無乃未知左氏者歟且彼惟其達也故言鄭子太叔占楚子但曰周易有之在復之頥秦醫之占晉侯但曰在周易女惑男謂之蠱如在師之臨如在雷乗乾曰大壯初無揲蓍布卦之事其果契于夫子論不恒其德者歟或又謂左氏非真逹乎此也由其言數者之蓍則筆端偶造乎此亦如洛學論韓退之初未知道由學文而有到語非素知道者其信然歟且艮之隨者其五爻皆以隂陽之老而變特二為少隂不變耳故曰八此其為説甚易知杜預又以為雜用連山歸藏以七八為占非多知歟併請辨其所以本朝樂律厯同出厯輒變輒差而律之為樂也亦議論更改而不定恭惟國朝始用周樂以治繼亂所損益可知也故藝祖以其聲髙且命和峴討論之先之以西京銅望臬次之以上黨羊頭黍由是而雅樂和暢盖下于向也王朴一律矣垂八年而李照始非之阮逸胡安定復起而攻照之失胡阮之失也而徐復房庶又非之故仁宗之世而樂屢制焉其後也司馬温公以一黍之廣為尺而後制律則是安定而非房庶范蜀公用一黍之起積一千二百黍之廣為律而後生尺則是房庶而非安定崇寧中蜀公一故吏以公舊所制作之説來上而大晟樂以調夫使温公而聞大晟之奏也其善之耶其未耶彼亦一是非此亦一是非昔景祐間韓琦丁度惟厭其是非之無辨也故琦之言曰海内擊壌鼓腹以歌太平斯乃治古之樂可得以器象求乎噫信斯言也古人累黍之縱横長廣以校其毫釐非耶度之言曰歲有豐儉地有肥磽黍驗不齊古之立法存其大槩爾噫信斯言也今之定律隨時髙下不必倣諸古耶嗟夫音之難知也如此哉况樂又有大可疑者君子不可不辨也太常之樂設而不可聴教坊之樂聽而謂之淫然則古樂果若是其不可聽而可聽者皆為淫聲哉今之人不能聽古樂而古樂感當時之人何也誠恐太常之樂未必合古即教坊之樂而諧之以正聲乃其所以古也否則因古之器而理今之聲其庶幾古乎非也車制五輅之制興于周周非不美也夫子答為邦之問而必有取于商然則聖人于此一事重之不敢忽葢因物以寓禮豈但推之以行陸而已哉自服牛乗馬引重致逺作于黄帝而陶唐氏之彤車有虞氏之鸞車夏后氏之鈎車出焉商人之大輅又出焉意者愈出愈工至周而盡善矣何夫子之必反耶若謂文勝則反之以質然則周公過歟商之大輅山車也亦曰桑根以其金根之色也秦漢魏晉以來皆有金根車豈商制之美耶或以是為副車又何耶五輅尚矣而後周十二等之設果足以備昔人之未備者耶抑太繁耶然漢大駕備車千乗屬車八十一乗豈十二等之在後周為簡耶大駕八十一乗而法駕止于三十六何耶有辟惡有鼓吹有記里鼔有羊有象有豹尾後代迭興神巧百出豈指南之創于有熊氏耶四馬固也六馬見于夏書葢有所自來是為天子之車良馬四之五之六之者干旄不云乎是又何也漢人加以一騑而備五馬之數以為郡守之飾果當歟晉人黄鉞之一馬金鉞金鉦之三馬又何耶周禮春官有巾車典路至于車僕則專職戎車者也胡為不屬于夏官耶名器㣲悉之事願條歴代之當否一一以對毋使畧焉地理之疑人謂天文之學難于地理地理之學實難于天文何以言之耶天運一日而過周天一度人能一歲而究心乎是則大畧不逃乎吾之目中矣是可坐而學也前輩謂不行萬里不能通杜子美詩而司馬遷之作史記則跋涉經年而後敢措筆是知地理之學為尤難也古今郡縣更置分并移易又或逺近山川名號相類經史傳註稍不加審則舛誤實多而後學㝷究能無病焉試嘗以三國六朝觀之蜀蔣琬請徙屯涪非今之涪州歟説者又以漢涪縣地實今之綿州葢華陽國志有曰涪去成都三百五十里東北之要而郡縣志之述是州則其去成都之里數與均而亦曰為東北之要衝且有西臨涪水之言然則所謂涪者果綿州非歟又有馬謖敗于街亭者則南鄭是也寰宇記及興國圖經皆載之矣談者又以為方是時也亮已攻祁山而天水等郡皆響應豈有遽還南鄭而與張郃戰耶故李吉甫著于秦州隴城縣而所謂街泉亭者是也政和輿地記亦以此有街泉亭焉然則果南鄭歟隴城歟赤壁者蒲圻歟汶川歟郡縣圖志者李吉甫之所作也謂汶川之縣西八十里崖有赤色居人因以目為曹公敗處葢誤也果然非歟凡此皆可疑也晉袁真攻譙梁以開石門攷之地理書其淮漢之北石門非一有在解縣者有在慈州者説者以晉師至衛縣而還是不及解慈之境也元豐九域志以為當在今之東平府齊侯鄭伯所盟之地果然歟庾翼鎮㐮陽使桓宣進擊李羆于丹水今懐州澤州皆有丹水又商州之上洛則丹水之所自出然漢之丹水縣則實今鄧州之境所謂丹水鎮是也以是為宣羆所戰之處然歟是亦可疑者也劉牢之等之所據碻磝者晉季毁于河水宋元嘉之所城者則今鄆州之陽榖非秦東郡之茌平為今博州之聊城者歟此地易而名存得無疑歟其信然歟吕蒙所築濡須塢者既以為和州含山縣又以為在巢縣則今無為軍也或以為在兩邑之間則二州之圖經皆有其名其果然歟寧使人無疑歟幸參訂焉毋謂難于天文而畧之也八陣八陣昉于諸葛孔明乎曰為握機者風后是在黄帝有之矣噫謂之風后雖未必然其在後漢立秋之日斬牲貙劉𨽻孫吴六十四陣得非前此有是已乎天衡地軸一員一方而二者各有前後之衡前為虎翼後為飛龍風附天雲附地風曰蛇蟠雲曰鳥翔右者與蛇為隂而同位西北左者與鳥為陽而同位東南其類象若是當乎否也且四正者天地風雲也四奇者龍虎鳥蛇也風雲既為正矣安得又有鳥蛇者為奇耶虎翼蛇蟠以之圍繞飛龍鳥翔以之突擊不知突擊者有時而圍繞圍繞者有時而突擊歟抑專乎此也無乃一陣之中有兩陣一戰一守歟果若是又不可以分别言之也抑或分或合其形之變不能以指定歟圖之者其常而至于其變又安得而圖之歟且游軍二十四陣本在後也而握機文又有曰先出游軍定兩端何耶况兩端本在天衡位也自方勝員遞之至鴈行而反以勝方夫序而至八則鴈行在七者之下矣又以勝其最先者此其為法何如耶豈陣法所謂常山蛇形而能首尾相救正若是歟李靖答太宗之問謂陣數有九而大將握其中四靣八向皆取准焉是果八卦九宫有自來也又以為詭設其名何耶司馬穰苴八陣之兵數與夫後人之六花十二辰者其皆出于是歟併欲聞其㫖請毋以俎豆為辭樂軒集卷八
