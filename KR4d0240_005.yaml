body:
  text: 樂軒集卷五宋陳藻撰記復庵記余客姑蘇且半載罕相識者竊自笑曰丁寬易不東矣歸念頗濃陳氏子年逾弱冠吾鄉大義譜也先世之浙宦而家焉近榜一庵為復請余文以記噫俊甫未知復之義耶能以名其庵謂既知之奚請於余夫復之為義大矣哉揚子雲太元嘗發之曰陽氣潛萌於黃宫信無不在其中此萬物孚也人一善念動於肝鬲則為百行之原用為階以升於天及乎天則階為筌是非階也焉得而筌之乎天雖無窮即是昭昭之多也且在六十四卦之易為復在一卦之乾為元今子取而題其居以復知之耶抑暗合之耶知則請充之暗合則請思之顔淵何人也俊甫何人也有為者亦若是不逺復無祇悔元吉豈千載而上一顔淵而已哉二也四也微繇之繫孰得其門文王周公既大闢其門夫子象之又挈其人之手以入孰拒俊甫之來哉惟恐望之而不肯入也若夫頻復猶可迷復可乎哉俊甫貌古而言朴保無是也前言難盡俊甫果有意乎幸勉之天髙地厚以是一復為泰為壯為萃為益舜不得是無以鼓南風阜財之琴禹不得是無以歌九功而敘九疇默坐其中而細惟其義則斯須六合斂而聚見於一庵又俄而盡歸於俊甫之方寸是其樂也庸有既乎嘉泰壬戌季春朔日合沙陳某記筮記龍以土冠余降之年紀三竒二吾惴焉十死詢之八九無半百父母不克葬大父母雖葬誰守豈不懷歸有垂者槖槖我亡垂峽門衝衝金翅玉融故鄉兩驛有山名鐘故人不索租我乎渠渠曰有妻子其頥箕以虗祭於墓歲一至三歲或再至有一至焉者我惘惘然無意於人世也日忍飢誦經為無蘭之馨鼠肝而人形兹焉惟香火是營茍可以逃三千之大刑而已也噫徯非尫尫誰撲吾顙道也仆不敢艾吾余將有逺行筮焉懼夫妄也遇需之井其繇曰利用恆無咎易窮則變吾窮矣奚其恆更筮遇大畜有厲利已嘻吾已則那於蟲斯房于鳥斯窠匪齋匪精筮其不靈三日齋七日戒蓍兮其徵繇不云乎咸其腓凶居吉是猶夫二者兆也盥手祝蓍曰再三瀆瀆則不告今豫決不敢嗣有瀆筮告之井谷射鮒甕敝漏泣數行下歌曰筋骨徒勞誘人者軻我躬奈何遑恤其他又歌曰郭外無田顔死道邊我躬不天遑享其先日者遇焉問何故語之故曰筮某事也雖萬不兆足下越樽爼而代之夫造物者使各業其業生其生我司乎鬻君技乎售君留金不信三揲之初遇屯即鹿無虞惟入於林中君子幾不如舍往吝次來之坎坎險且枕入于坎窞勿用三曰明夷于飛垂其翼君子於行三日不食有攸往主人有言日者駭留其金我申我歌適空虛而逃壺山嵯峨下有蓬蒿餐松柏以免死兾將來之有遭聞人足音跫然而喜三子者束書從我遊其咸孔多避喧記丘永言屢謂余曰旨哉貧也弟子不貧則無此見貧亦何負於人耶余默知其進於道莊周以造物者為大宗師余謂造物者之誨人亦無他術貧之者其一耳彼其富之者乃其不屑教之者也雖然能受教者亦鮮矣丘氏子其可教者耶富不如貧古有是語其誰進於是耶其誰可與遊於大宗師之門耶子從幼執孝經論語從余以發蒙時則其家為三溪溫户也及長有妻子父死母存鼎分舊宅孟中而叔南季得其北雖廳事堂室季有其全遊觀無所子從謂今爨無欲清矣易置於旁壤後庖之舊壁果木交隂面林泉而背市肆開忩為竈為臺為墻則蕭然一亭焉不畫不堊命之避喧余笑曰喧方避子從何待子從避喧耶答曰不肖不甘蔬糲不羡布褐則冒法尋喧而入求醉飽鮮服矣鞭笞不恤况於清議安能靜坐斯須耶曰生之言然前言戲之耳故有時烹芋滿鍋或作鹽醯湯餅欵延老夫談笑其間而相與嘆貧之旨也嘉定甲戌日長至永言因請書其事謹記序樂軒序樂軒子生于長樂之西郭距百里為長樂縣縣人舉進士諱落以邑稱僮僕聲落輒有刑今童子商榷場屋駒老馬無憚吾諱落免乎樂軒子無軒長樂軒也故號樂軒雖然吾樂否也送方孺春赴仙遊簿序瀕海之民有曽姓者聘林為婦林幼依於伯母何何收其地利而婢使之及壯受曽銀百兩帛二十端諾其歸也以厚裝曽以書抵何速鬻林田吾欲得錢耳僕以錢十萬買其田三畝有竒餘田售之他人曽之聘幣何既奄有之鬻田之金何又盜其半曾訴何於縣何賂吏以免恐曽不勝無以得曾賂奪僕田而畀之嗚呼蠶則績而蟹有筐范則冠而蟬有緌林也嫁而僕為之裝僕休矣聞者不平勸僕訟於上司民姦吏猾抑何其甚雖然居官者明則無是矣君之别也將聼民訟敢序以告送逹翁赴潮陽序庶民出賦以供百官百官居有衛出有導富貴於人而無慊者我能為汝平曲直正功罪也民有頑而賦不輸撻之可也今民有訟名為詣官而豫奪之實在胥吏理微貨而不信是前日出賦徒以供無用之百官而今日之訟能不納貨於有功于吾之胥吏也哉釋老之徒無功而受施儒者擯之彼雖左誑然以誘民而得財百官怙權驅強猾以窮追擾箠械呌號竭民膏血而不恤其貧若事則亦無與焉儒道之衰至是反不若釋老矣逹翁行且食民賦也能使民有訟不納貸於吏而賦不為虗出者乎其行也序以訊之送劉叔嘉赴太學試序士之試也志於得詞之作者志於是果哉近歲之為場屋也賦黃帝以雲紀曰紀事取焉曰紀官黜之矣賦上聖垂仁義之統曰統一取焉曰統緒黜之矣聖人祖乾綱以流化則曰運與權悲乎哉隨時去取所主又多端也從其是萬一不得從其非喪厥守叔嘉與余逰數載矣今以待補赴于京聽吾言也雖往何益不聽吾言得寧有是哉雖然今必由是而後得未可知也姑因其行序泄吾憤爾容膝軒序形骸者精神之逆旅也宫室者又形骸之蘧廬也以逆旅而寄蘧廬妄乎哉不妄也是故環堵之室至人之所居一畝之宫儒者之所處逍遙寢卧其下而不以為狹者何哉誠以方寸之大大於六合而無假乎外此孟軻所以食前方丈我得志不為而陶淵明所以小忩容膝而有忘世之樂也今某人飬志而忘其形樂天而無徇於物創為小軒命之曰容膝託余為序豫嘉其志而不得辭故序之云爾晝偃廬序劉徽之字叔猷結廬花圃謁名三載未暇命也一日讀唐人劉言史秋詩其末聨云才薄無潘輿便便晝偃廬余久客橫塘因娶劉家而即居焉按塘東西世譜蓋從王氏光州來然自閩太傅存而上失其傳今唐書王潮傳所載劉行全豈其先耶人之族屬多散處言史亦其祖裔未可知也三五百年揣摩舊事偶或有中則取晝偃以名廬乃吾家故實不猶愈於借諸葛陶令家事乎詩曰豈無他人不如我同姓慶元二年正月望日序勸戴伯陽歸鄉序翠山之西有荒塜塜有亭亭有一人寓焉桐鄉進士也夏衣緼袍天寒緼袍且破夜無衾裯病纍日晨起餒甚復卧日午﨑嶇上下往二里至虎丘求火歸爨飯成對案不能食羸困復卧矣于嗟戴生好古道耻今人輕利重義故凍餒及此生賢矣哉然任質直失通變傾心喜交故患難及此生愚矣哉余無家客食此土愚於伯陽而無其賢其窮殺一等非幸歟噫拙相似困相似余戚於心寢食興念思無以賙勸其歸而已生非不肖親戚閭里憫其顛頓狼狽何哂之有生毋恧焉余有薄田余歸矣與其歸也寧不歸生歸乎哉再拜以别興而賦詩式微式微胡不歸微君之故胡為乎中露式微式微胡不歸微君之躬胡為乎泥中無積序斂石新戒嘉運謁字於余余聞莊子嘗以運而無積形容乎道故以無積字之夫運而無積者不已也已則為積且人之一身其元氣周流而無滯則五藏安平四肢和暢滯則為積積之在內為喘為嗽為渴為泄其熱焦火其寒凝冰積之在外綻而為瘍之形且凡數十種焉甚則足以殞其軀積之可畏如此哉夫其在天地之間亦是氣也壅積而不流隂為水陽為旱在天於日月星辰在地於五行萬物為蝕為彗為一切之沴兹道之在氣而其積於形也若是矣道而寓於人之百行也亦然運而無積為堯兢兢為舜業業湯之又日新文之純不已孔子之自強不息子思之誠悠久如積焉於耳而不聰於目而不明於心而邪思於手足而妄動於口舌而淫言淫食是其於俗也為小人無以為君子况為比丘氏乎佛者損之而又損其為功也難於堯舜孔子蓋飲食男女人之大欲七篇之書所謂食色性也堯舜周孔食肉飲酒而有婦人焉佛則無是也堯舜周孔非不損而佛之損則甚於前數聖人者何哉堯舜之用窮而夫子生夫子之用窮而佛生堯舜能化一世之人而未能化千萬世之人夫子則能化千萬世之人故曰夫子賢於堯舜然夫子能化君子善人而至愚極惡之人明王不作夫子亦末如之何也已夫至愚極惡之人因嗜欲而為盜賊為弒君父為殺兄弟為禽獸以報蒸佛以是故而自布衣蔬食之外一毫不欲焉蓋造物者生是相而為是矯以正夫人矯枉則過正不甚不可仲尼則不為己甚者也仲尼雖不為己甚亦不能化甚小人者焉故佛為是甚者以化甚小人者一日而不行其甚者是佛者道運之積矣今削髮而為比丘佛之徒也茍食肉飲酒而有婦人焉則其獲罪於天地鬼神非俗人比也俗人飲酒食肉有妻妾無罪淫於娼亦無罪飲食僭侈淫於其非所有然後有刑比丘氏受佛之戒動則為罪夫若是何哉四民者皆有常職以衣以食比丘氏不耕不蠶而無愧者以至愚極惡之人視之以為模範也模不模範不範何功而衣食於人哉是其蹈地獄也奚疑矣丘子中逸老堂序三溪丘子中信願之士也架所居堂名謁於余懶思之蹉跎兩載乃一面焉曰永孚得之矣逸老何如曰美哉俾余命之未必到也喜而舉巵請豫賦詩辭多戾韻變而序之夫莊周四條人獲其三若此三字履之者鮮焉蓋有可逸而不逸天勞以貪而不與之逸有能逸而不逸天勞以貧而不與之逸是故髮垂素而身紆朱望權貴之門兮趦趄廪祿豈無餘懼一日之間居自是以下有可逸而不逸者凡幾等皆貪故也汙萊之翁飽焉則慵斯須輟工口腹奚充自是以上有能逸而不逸者凡幾等皆貧故也余賦性疏野每見髙牙大纛未嘗起羡慕心兼少壯艱厄圖為今日計非厚需於造物者似能逸而易得也且念顔淵以退為進有子不克讀書遣之樵爨凡百簡陋庶無費力以盡吾年然吾退雖猛覺一鬼物執撲以隨吾後其進愈健是撲也無形能潛入而敲人之中扄東驅西迫不容少宅其技無他但汝益刪其費則吾益吝其資俾常不足汝能逸之乎吾見甚可畏也而又可笑也己子中紈袴之餘然理生之具視前日損焉而兒女之纍繁其心嗜逸勢何以逸所幸歲月未央若纍止此焉計畢婚嫁猶及者希之前使天祐其善而與之逸子中非不能者歌於斯笑於斯弄諸孫於斯有客焉來觀斯序於斯則曰昔人陳某所作其時嘉定元年日南至也綿亭楊氏子名字序曰卿曰傑半天下問其名位則皆庶人其卿謂何觀其言行則皆流俗其傑謂何名不正則言不順焉能使人無議乎綿亭楊氏子欲以仁為名蓋異乎卿與傑者矣請二之曰宅仁聞者尤其異與其宅仁也寧卿傑然字之以子誨則使有嘲者吾寧無解焉夫子雖不妄許人以仁實提之以示誨為之固難也言之固訒也茍有志于學孰無聞於聖人之誨請就楊氏子之身而申其説孝弟仁之本本立而道生何仁是也仁即人合而言之道也盡人之道乃謂之仁夫豈易盡乎哉姑培其本者而已矣子誨之息也家素溫雖禮義生於富足富而後教然人心放恣多自於安逸况惟一子則父母之所鍾愛愛深而教淺寧無所以戕賊其孝弟之性者歟若是而求仁之宅逺矣幸而子誨逹於詩也詩三百思無邪無邪者誠誠者中中者仁此詩之至也吾又未敢以望子誨其次成孝敬厚人倫莫切於詩若能於此而用力焉則其本立矣後生可畏安知異時之實不足以副其名耶可孫名字序古者二十而冠今之人不待焉余以其年冠其子為貧故也失禮求諸野吾豈以失禮而求諸野之貧者乎冠必有字可孫既躬農圃之役而非佩帶經叩角者之學如字之不亦僭乎然子以父任食祿父以子榮敘封人倫之懿天道之極田夫野老以可孫狎我我亦以是敬之敘封之反也可孫以我而有字其亦奏補之義歟腐儒有子不能世其業而趨於農尤穹壤間之要職名之曰本德字之曰禹式汝其懋哉年孫名字序來爾年孫昔余志筮有曰十死問之八九無半百落筆而笑吾毋蹈是歟則人指為語讖矣年及之而汝適來吾以此時猶未死亦足謂年因以命之明年吾老希而汝今弱冠向以本德命汝兄而字之禹式勉其役於農圃也汝雖慧於兄然亦非秀民之徒其呼之以奚彞德二字入而長上出而官府及汝自稱此蒸民之均秉者其朋儕則以禹遂呼之夫能不逺其彞德而遂於禹之仁亦良民已况充乎此吾不敢知亦不敢絶也樂軒集卷五
