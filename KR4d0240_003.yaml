body:
  text: 樂軒集卷三宋陳藻撰詩次韻回叔經從來剽竊為場屋直是無繇識古書屈指罕能官顯達到頭剩得腹空虛君今身計非謀祿地有人耕免荷鋤髙適學詩年更晚才名何患不相如喜雨年登猶藉米船通去歲那堪一大凶人死多因飢後疫秧焦爭值北來風晴空又似驕陽起罄室誰支此患重甘雨連朝雖未洽蒔田漸喜澤邉農詠陳和伯母墳嘉禾芝草甘露之祥慕親五十歎姚虞况是行年六十餘方執母喪啼若孺雖居禫制飯猶蔬天存屋漏人純孝曉到墳頭暮倚廬芝草嘉禾甘露應少為嫠婦解生雛除夕歲晚民貧百物廉無錢堪買亦何嫌聊將送酒呼鄰客淺飲三杯不用添盧北山元夕社屋相忘鼓笛鳴空村步月興堪乘何須更要鰲山立野燒天邉勝看燈遇事有感命薄世仍貧如何避苦辛姓名聞有我忠信話無人哭死堪多舊論交笑一新聖經誰可愛場屋散天真橫江亭東注流求日本波西吞金翅玉融河好開亭館延三益橫截江潮看萬艘此是人煙生巨海莫辭鮮食送新醪網山勝處名賢迹隔水相迎立兩坡剪春羅隋時宫女逐流波尚有精魂在處多待到百花零落盡從頭子細剪春羅送郭定夫相看無可分逺適無可錢但向主人家杯酒時同燕交緣何太淺春風方識靣子行歸有期我老魂將變後會信難思雖在殊州縣史遷南北遊值我鄉邦彥話間及死生亦足知深眷石城伴梅福共祝天和練送張謙父往潭州八卦重來夢一周人生更得幾年浮看君矍鑠猶堪展似我龍鍾只合休淮廣早供詞峽興湖湘留與鬢霜遊還鄉試問同庚客剩有頭顱話舊否書懷奉簡張謙父浮家官道傍日夕逢佳客無錢可用丹有眼非開白今春寧逺遁往歲多慚色一飯不能酬飢來祗乞食才華張八老老昧幽居僻邂逅出新醅殷勤如舊識燒笋美鮮嘗買羊甘貴直畦蔬繞舍生園果亦堪摘看君雖貧士與我同庚帙夫何造物偏格我強其力贈余子畏相識紅泉舊日多年年地上漸消磨眼青好我今無幾頭白逢君喜若何縱道索居無伴侣却能默悟自雄豪細君掃去床書怒笑答為儒合詆訶子畏和云世多畏路嗟豫怯天有危機奈子何子畏惠詩用韻酬之老慵秖合在雞羣變化那能慕海鵾壯嵗親朋多死别窮途造化與生存欲尋衣食愁無路却被妻孥怨少恩健筆期君今落第相賙未得剩空論送蔡伯畛往潮州四首迎侍雖然勝左遷戀鄉畢竟怕離筵讀書不合能譏佛罰向潮州住幾年聽説漳南象窟間如今行路不愁難黃茅青草無人處多有軒亭好缷鞍似我生男父合貧腰斤嶺上解求薪君今有子為官去何憚㩦家踏路塵向來一夢兆孤青還記伶俜過驛亭今日此行非昨日他時歸騎想掀騰問吳叔經病向來風月已傷多誰料中身更被魔萱草别非資灌溉桐音何事不純和人倫自古無娼妓世態憑渠暫笑歌若是此身能解脫掃除藥餌病消磨贈髙待聘某自為童子居城郭間多見老儒奔走窘急之狀皆是強壯聚徒鋪席閙熱者及觀其下筆則已顛倒錯亂實有取窮之資今吾兄年髙而才益壯乃亦在若人之列此向所未見者兼自及晚途親朋凋落亦無援助興感于懷遂成古風奉呈待聘先生二十六弟子滿堂修幾束下床一麵月幾千有客市㕓錢别録為兒不誦杞菊篇舉筯欠魚須要肉老夫弱冠奇一秋飄零來問君平卜先生稱我有雋才滿縣青襟皆拭目一日僅能赴三飯折簡叩扉知幾幅今夜酒移明夜醉凌晨乞展黃昏速四邉延我入師席席則有餘身不足髙子行年已若干更度四期心從欲月錢祇直曉點心薪蔬盡此攜兒畜抱書誰肯訪吾門看君有是猶霑祿井泉比舊百倍深汲人綆短無麻續時去技精分愈窮時來淺學難逃福販商射利偶贏餘便詫巧謀能潤屋莫待黃金當散時舟車到處遭顛覆龍嶼偶作年少彎弓中鵠心到頭衰暮也沉沉有機悟道書篇懶無事關懷睡思深跋扈笑非當日態低回靜向此山吟撥來自有洪纎韻牙是天工我是琴夢故人死生休道隔幽明夢裏相看話舊情幻出他誰真靣目莫教總是自心成黃景詠七十我才弱冠出鄉閭日漸回頭舊迹踈惟有鄉閭才德士記在心胸如記書老來乍作龍門客臭味訝君多似渠講論前輩三數公果然少壯皆羣居因話隆興乾道事恍惚此身棲故廬乃知場屋非巨網却放鯤鯨為逸魚不得浮名須得壽人爵何如天爵有談禪會意一二言遣興成詩千百首氣清形瘦力不羸緩步登臨快如走夕陽曉雞神愈健端坐縱談誰解糾今春七十休計年此是神仙人識否生平但看神仙手何曽把錢弄升斗黃景詠夫婦七十身形清且瘦乾坤一竿竹欺雪可千年必壽先五福易道古難全陽九配隂六先後期月間唱隨來相逐夫天君職間婦地臣勞服觴詠恣優遊生理閨房熟今春古稀會元夜增和淑二老出勸酬笑談相往復織女戲牛郎輟耕歸辟穀仙翁答王母蟠桃真勝肉薌巒香山白樂天香草荆屈平釋氏定而慧道家直且清儒臣司燮理至治薰神明不然岩谷間亦作蘭茝馨郁郁若沉水茫茫夷島生人從韓壽徒去就焉知輕詎如賢達門氣類全精誠鮑肆不肯入結交皆羣英男以芳自持女以烈主盟時雖付衰殁久亦騰褒旌自古葬枯骨阿誰埋令聲所以薌巒上遺芬始崢嶸一字可為諡雙魂無愧情寧馨把仙桂已在月中行迤邐銜雞舌筆花對長檠紫薇引當坐紅藥歡相迎送郭定夫往江西二首去年誤作送君詩却又論文得幾時今日溪邉成話别榮歸早赴北堂期石城少府自公餘拄笏看山問老夫向道封胡羣從宅馮生不到食魚無送黃欽之赴廣州鹽稅三首地氣周遭逐處流五羊漸已似中州海風吹斷山無瘴炎月何妨作宦遊莫嫌征稅太喧卑尺蠖將伸用屈為好趂江西趨召命此詩兼送入京時一族名家叔度孫同時入嶺五華軒使臺帥閫終須到官職髙低且暫論謝丘子中惠詩髙叟生來五十年方知弄筆學詩篇此翁甲子才奇一吟詠看看到適邉寄黃景詠仙翁早歲學吾鄉我到衰年客仞墻栁下和風今有惠江西詩派又傳黃幽居衆仰仁山靜默坐身回佛日光人世大都如夢覺雖然如夢話難忘暮秋閏月平步樓口占恰已論心四十秋朱顔化作素絲頭種田有穫須知足應物無貪亦寡尤浮世欲回殘夢未男兒休管讀書否任他門户隨時變尊酒相逢且勸酬西軒罷齋暫别先後進諸友菜羮脫粟布襴衫酒肉隨時亦飽酣生理傍人那得見泉源在我久彌甘此身可是陶成器來學須教青出藍若要參禪垂一問也勝削髮禮瞿曇顔伯溫生日席上口占今日開筵賀始生來年今日辦西行後年壁挂登科記今日人看指姓名送穀準羊肩賀伯溫曲江宴罷注官旋親舊肥家有酒船我老學農雖未遂穀分一石準羊肩西宫中夜聞紡聲半夜俄聞踏紡車鄰人如此解勤家東奔西走方來憩驚覺真知何處邪别林肅翁吾鄉人士多遊江浙其取青嫓白便以資身肅翁此行乃一鳴鐘矣小大隨扣榮駟橋歸亦分內事然吾人以退為常且作羈中寂寞語以餞之云滿懷裝貨出門前多寡相酬應世緣取友無他惟會理逢僧秖此是談禪樂生箇裏真慚愧用向稠中足裹纒便謝化工分付足莫言行李去蕭然讀東坡玉糝詩因成一絶續去年芋莖羮後寄丘林陳三友味有酥陀出自天芋成玉糝却同然此羮若使東坡見尤怪枯莖化得偏六月望夜紀飲年老聊依年少遊月圓庭上似中秋舉杯問月爭多少一度猶行甲子周贈許秀才祖工儷句集刋行業販儒書乃父能莫恥向人傭作字世禆文教後須興寄楊南仲君思家世質云此閨閭華我知財貨裏自出人驕奢先翁非勤儉安能美生涯兒郎不鼓舞造化無萌芽從今君已悟拈骰入喧譁結棚粧俚戲達旦聽淫哇書子誨所寄詩後搖膝支頤體漸康入門已作白家香從今休傍官人俗但向林泉呼二郎詠子誨門外荷花門外芙蓉未肯花西風彌月露多華我來為客如相約細沼同時十一葩朱叔清小樓謁名并詩望舒雖是月借作此樓名收爾萬家地歸吾雙眼明規模成巧小景物散縱橫人若無髙見虛空柱謾擎叔清留飲座上感懷十夜不相見一見又如初兄弟無人在交朋却我餘矢弧皆後挂銘旐競先書有酒堪留客悲懷且掃除歲晚朱叔清樓上談詩話佛飲酒聽琴作歲晚家何處因循未得歸本無愁可遣寧有佛堪依翁子談佳句郎君撫妙徽剔燈聊共醉明日又分飛謝余子京驤惠詩晝同學厯夜觀星壯日情親忽老成莫恨異鄉相見少一來人物一番更逺來無物示拳拳到老生涯尚闕然坐久但貪情話好又勤雞黍費囊錢題吳景恬寫三傳正後叔謨子乃翁催我傳春秋及我書成已合眸有子傳家何可憾夜深燈火問東周謝王爾瞻爾中惠詩兄弟初年事網山髭鬚未出正童顔我方盛壯今羸老多謝新詩敘舊歡久不到黃石故人相見多喜余紅顔吳世執友喻之霜柿謂其熟而將墜也年將四十客莆陽丱角相看笑語長今日生男行冠禮老如霜柿又逢場謝余薦梟聽易惠詩一首向得追隨父祖間此來重結子孫歡自嗟三世須臾見不有餘生會遇難詩社已收風月美舉場秖用粃粳殘百錢聊買時文看容易如君直換官和林君作起叔梅詩韻林逋沒後幾星霜苦要吟梅弄爝光兩處湖光看共色一家詩句嗅同香花開再約談玄白駑老那能逐乘黃又恐來冬隨計吏仙霞不管似羊腸劉躔父生男生來長誦老夫詩那可無詩慶浴兒得巽曽吟吟是讖果然先偶次從奇賀叔嘉生日一子纍輕婚事畢如何學易已皤然天無快活除君壽任待皤然也百年賀劉直之值改官公車五剡得京官俗態營求有百端但看樂昌劉令尹了無一語汗人顔里人歡喜看榮歸兩僕藍輿自有輝勝在宦途無事業但將裘馬詫輕肥少年場屋有程文但見髙才逈出羣今日江邉看道骨世人涵飬罕如君日者紛紛步五星諸儒言命亦相承大人雙眼如明月照出毫釐不肯憑賀丘煥翁南歸三十年前八桂歸西江船上每吟詩乃翁收拾傳尤切令子經從是果非渡海却休賢季路論文想勝謁羅池此行況有如臯雉藥裹拋來自畫眉劉公父新理花畦約賞菊因成樂軒行舊屋早易主新椽辦無錢帡幪託親友蹉跎經歲年碎纍入安宅隻身出隨緣引腹挂蛛網移簷餌羽鮮所愧厯遊賞不勞攜饌筵美名吾敢僣茂實衆推先但名長樂郡誰擬地行仙玉融未遍眼銀髮久垂肩何況縣十二欲周里數千軒齋或寄寓宿食輒留連公父白日暇後園清興牽種花成趣易席草覺情宣犬雞交巷陌風月自林泉匼匝山圍野晴明霞散天紅茰把雖過黃菊采猶憐詠我昔文賦泛渠今酒船清暉行主翁不解飲安事園池遊從知蓮社侣所樂在清修我憶少壯日未多禪悅優獨醒對佳景愁紋上眉頭四方觀唱禮文辭旨趣幽我膝固不屈彌陀暗相投葉吹光亂轉花覆實泉流此外無國土靜中反身求湛然真賞妙誰肯尋糟丘宿清暉禪家自古分人境心地明時境始明榕樾交隂墻內外卉花散采路縱橫築臺勾引江山入鑿沼因緣萍藕清好是炎天亭上宿便為淨土國中生經鉏兩間陋屋榜經鉏經是心明鉏是蔬種果始初花可玩繞墻藤蔓實堪儲若能棲止身為鳯何必奔馳食要魚人見此間無五畝誰知藝圃本寬舒過盧子俞番番留我殺雞多老齒如今不奈何本是年凶甘隔闊論情非為酒來過賀王嘉玉生日九帙初開二鄉閭敬老成今朝壽者出明日聖人生孫重勞昏嫁奴猶課耨耕乾坤無暫息翁嫗合營營次韻林君則惠詩湖水當門四面山旁羅書史坐中間他人共我何曽有造物於君本不慳況是早教緣纍少便知晚與歲時間餘糧摸得鮮魚煮大勝簞瓢陋巷顔感舊憶到渠來憶到渠滿懷無限不刋書獨行總是同行處剩得長年剩得吁鄭汝則七十少壯同時事網山幾人别後鬢能斑古稀慙愧今餘四君已平頭一醉歡贈陳伯融夫婦才子治春秋推尋命氏由果然佳偶遂夫豈俗人猶話自文章出身從勤儉修老夫歡喜見舊與兩家遊辛巳大歉村村無米歲何堪我到家家有酒酣自昔略經三兩度似今未見大生慚辛巳歲暮宴陸甥子由家吾妹嫁時狼狽甚幸皆存活得年深有男買屋棲遲喜見舅開樽爛熳斟歲值凶荒多餓死我慚溫飽更酣吟還鄉日少生難保敢覬今番一話心辛巳歲晚上墳偶然空手出州城薄有田園住福清晚得次男陪筆硯秋隨舉子省墳塋過淮不擬成僧去挂紙誰能接迹行多少隴頭無祭祀此來猶喜剩餘生嘆問塘東一二新舊數畝荒田不解耕老年場屋又無成更堪風雨飄搖甚告放渠儂與養生閲世道理初從紙上求因而處世得優遊于今但閲人間世自有文章筆下流辛巳秋後訪盧子俞作本是吾鄉少富藏五年亢旱太難當麥苖俱盡村如洗蔬芋全無市亦荒笑我擬為飢莩去訪君那得酒肴嘗更生一見真歡喜忍聽他人尚絶糧食粥絶句贈盧震夫古瓷大碗今無有特地凶年洗出來滿著十分牛乳粥客思喫盡鬼神猜戒買墓石人盜拆鄰墳築已墳價亷石大且輸君莫教孫子無如我自拆年時也易聞楞伽經若向他經義已詳此難成句也何妨昔人誤點經文會更不回頭徇故常過桃枝嶺兒童嬉戲向比鄰長見桃枝出郭人七十五翁方過嶺回頭舊事總成塵九峯過重陽算來七十五重陽無酒今朝對菊黃記得蘇杭船上坐一番醒眼詠詩章登髙却是今最髙九峯寺上誦莊騷茶話恰宜湯餅素滿身風癢怕村醪謝鄭如之送酒初十日俗緣不許伴僧齋錯喜重陽避酒杯誰擬衰翁對衰菊黃昏猶有白衣來謝九峯升坐相留重陽七日月當圓髙坐禪師祝萬年夢裏五更聞齒録凡夫有罪是貪眠贈九峯老佛土仙家本一般松菴海上住三山三三演出竒峯九生氣元來萃此間九峯僧房看山寺前寺後木彎環殿裏莊嚴佛一般衲子開窗還禮拜生株何用巧雕殘九峯看菊平生尋菊未曽遭直上成叢一丈髙幾處禪房驚老眼滿堂佛像自森羅送陳智叔舍人赴召紫袍入手閏兩周黃紙除書作郡侯後薪莫訝還居上巨魚直是能吞舟蕭何乃知天下信魯人祇道東家丘到了公評難嫉忌逺皆敬服近何尤器識髙明官令顯羞作軟媚隨波流膽略肯因權勢屈事機果中日前籌鴻飛似退正仙翼不蓍不龜心有眸兵形敵計何英識脈絡豈從經外紬友于根自惟孝發論語尚書政所由君於骨髓已先得字是皮毛剝便投強收老淚且分袂情共斯文苑囿留吾鄉有李明府其伯子襟懷敻然世表某早知敬慕長誦諸人今老矣輒韻之以貽其子孫云廟食於莆李長者變海為田散郊野福宜孫子百千年家甲三山總文雁西城一位京朝郎官雖未顯善聲揚伯曰孝純遵義方潘安容貌心蒙莊幼小摳趨父執時挂口何曽聞是非到了交遊如一日肯學世情隨盛衰我頭半白言稍傳晚出要教識前賢暌逺莫能修世契擬將下筆無由緣喜今有便歸鄉多吾姪春中偏飲和老去舊懷因稱敘吉人與就幸如何滿眼各為君父子誰憂平地起風波歲除僧寺看寫疏作元正祈禱萬千般縱道聰明聽也難料得鬼神應喜我不曽投疏一相干首正有感二首憶昔吾鄉入首正衩衣街斷小書生紫衫來去今無幾恰似當年冠帶行聽説從前我未生知書不許衩衣行平時街上齊冠帶況是人間歲節更口占寄林子六君則日月相催不放遲寄詩又是去年時近來未省開懷否還似從前尚皺眉寓故里大中寺值朱起蔡同宿數夜壯遊初到鄭公鄉與子吟哦古佛旁老去同時人死盡那知來此話僧房上東山墳寄敬之弟東山零落古三丘力薄那能抑得周賴有阿連霑寸祿我慚到老一來休癸未生朝躔父公父以酒殽而華其陋賦一絶家貧何敢話生朝多謝開尊慰寂寥要迹一杯辭不受但需拙句作瓊瑶中秋詩書讀罷問耕牛待得時來死便休一帶空村無潤屋聊因社肉作中秋次韻源仲八丈日理之作眼中皆道境墻內是君家樂處元無盡吾生任有涯賀四五姑七十壯歲貧而旅無家可語歸見多延酒饌躬為補裳衣頭白諸親忝心丹百事違何堪持報德但喜母年希艾軒老先生文集刋傳上以揄揚其問學下則得佛家以法布施之意前後數君子有是志而不果今日薄西山幸一見此喜成古風三篇以賀後來之有作者且述下悰云老艾先生殁駸駸四紀年衣冠常嘆惜文字合刋傳東巒乃猶子遺藁掇拾全網山雖上足無刀堪雕鐫從遊今殆盡録藏多散捐裔孫韙君應發憤起收編甲集且流布俸微艱得錢晚春題壁去名姓輝藍田製錦增廩給乙丙尋踵前搜羅必盈十但祝君髙遷我老不可待權輿已欣然夫子刪詩去流年近二千何人悟芣茝此老獨遺筌活鯉收入袖化龍騎上仙傍看休發問無語堪相傳假令託忠恕投塊答僧禪依前提出後未誰知的然給還上手契各認落江田蚤歲過玉融悟逢陳叔盥曽待艾翁來國風話長短忽聽誦采蘋玉川茶八碗因入網山門多舍莆陽館今喜文集行源流心事滿頭顱七十六見此抑何緩百為信有待立志如君罕良晤向三山夤緣非偶款樂軒集卷三
