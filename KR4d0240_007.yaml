body:
  text: 樂軒集卷七宋陳藻撰䇿問史記左傳所言歲星異同步五星之法莫難于火莫易于木雖見伏留行逆順遲速五者皆然而前後之數惟火為多端木謂之歲者以一期一次十有二次而周天指諸掌而可定也夫以易推之星而見于左氏史記二家之所載則有甚難曉者焉何哉襄二十八年其在年表則丙辰也歲在星紀而淫于玄枵非梓氏之云乎辰而在丑已而在子矣越三年而戊午也歲在娵訾之口其明年乃及降婁非禆竈之云乎午而在亥未而在戌矣逮昭之八年丁卯也今在析木之津非史趙之云乎卯而在寅矣故杜預于襄之十八年丙午也釋董叔天道西北之語而知其歲在豕韋豕韋者何亥之位也攝提格歲歲隂左行在寅星右轉居丑單閼歲在卯星居子執徐歲在辰星居亥大荒落歲在巳星居戌史記之天官書則云乎爾也如左氏之説則寅而在卯午而在亥矣如司馬之説則寅而在丑辰而在亥以次推之皆不同焉兹不為甚難曉者乎若果難歟則星官厯翁之算以火為上土次之金水為易而木尤其易者何也豈行有常度固若易考而其所以行者不蹈其常則難測歟非二史各因其時而言其所躔之度歟且五星之聚于東井太白之經天熒惑之失于匏瓜若此類者其見于前史蓋不少可以一定之法求之歟五緯盈縮不常李晟不敢保渭橋之勝負識者以為知言然則二家之異同不足怪也否則亦各有指歸司馬之法厯家謂之演記分野星度分野仰觀俯察古人以是而得災祥之實豈無據空言乎然考之十二次則東西南北之相反者四降婁之次其宿婁胃其位乾維而魯則東北何嘗西北耶實沈之次其宿觜參其位坤維而晉實在北何嘗西南耶大梁者昴畢之宿其位西正而趙則在北鶉火者栁星之次其位南正而周豈其南此大不然也其疑似則有七焉玄枵者虛危之宿是為北正齊則東北豈北正乎娵訾者壁奎之宿是為乾維衛固近北豈西北乎鶉首者井之宿亦為坤維秦固其西何以謂之西南歟鶉尾者翼軫之宿是謂巽維楚固其南何以謂之東南歟壽星則角亢亦巽維也而鄭在中土大火則房心東正也而宋亦中土胡為乎東正胡為乎東南星紀吳分星則斗牛屬乎艮維吳得謂之東南詎宜以為東北也所可據者其惟析木乎其宿尾箕亦艮之維燕可以言東北也十有二次而可言者一亦太相戾而星土休咎之應載在傳册前後如符契是可不求其故歟抑嘗思之地在天之中特猶宇下之一榻耳天之度有餘而地之里不足夫奚足以相配雖然猶可擬議而指定也或者謂一動一靜不可以相當雖然按冬至星回于次而言之奚有不可者夫若果然則何以為能通之者歟嗚呼堯遷閼伯于商而分野之説其來舊矣周官保章氏讀者沿其末而竟莫究其源雖欲勿闕如之何勿闕其後班固漢志蔡雍月令陳卓之州郡躔次亦皆莫能遡其由以辨人之惑至唐一行之説然後似有可觀者焉是何也一行之意而斷之以天河夫雲漢潛萌于天稷之下進而及井其在地則百川自此上流矣故鶉首為秦蜀之區兹非兩戒山河之首乎實沈則為晉大梁則為趙天傾西北地不滿東南晉也趙也亦非上流之勢歟天稷在鶉火之下鶉火南正也自是而逹于大梁升氣悉究而娵訾在升降之中上接紫微是以為衛蓋中土也且自五月一隂生而河升十一月一陽升河漸降而沒矣是北正而及艮維則下接于地故星紀者下流其百川之所歸則吳之分也析木末派山河極于此而為燕大火東正天市之都在焉且其卦由泰而豫和氣之所布則為宋于土中于是壽星則鄭而鶉火則周周為洛地寒燠均焉鶉尾巽維其卦純乾則楚爾降婁遠乎首玄枵遠乎末遠乎首者魯而遠乎末者齊蓋魯南而齊北也此其為説果不易矣乎是蓋微妙出于方維之表也且步占星度由有天地以來始于黃帝則分野當聞于此時矣由黃帝而堯分野于是乎託始而竟不聞其所以何耶又堯之後三千餘年至唐而後有一僧得不傳之祕儒生亦未敢以為必然也諸君有能言之真無負于員冠方履者爾地理天傾西北地不滿東南此易之所謂地勢坤也西北為山東南為海故前後之言山河者至有三條四列兩戒之説然終不能究其勢故又從而三分之非其勢然歟晉代北也是為北紀山河之曲巴蜀雖南紀山河之曲而其地正西焉秦涼則西北之隅凡此皆負險之國負險則人之生也武此又其土風之必然者北燕碣石雖朔方而履于東國其夾于泰山者為齊為魯又循淮而南則荆楚吳越非負海之所歟貨殖則阜于此也其在中土則為成周為宋鄭陳蔡為邶衛申隨是為四戰用武之國蓋隂陽之所交和氣之所萃非四方比也然竊有疑焉夫所謂負險而用武者周之一門聚數聖人而八士伯達之徒往往生于一家其後文翁之學權輿于蜀王褒揚馬翩翩以出而我國家若有三蘇文人之翹楚也是何歟所謂負海貨殖者則吾道主盟于東魯三千七十濟濟彬彬以子貢貨殖而銷鑠于夫子爐錘之中繼而子思孟子皆傳道之宗自唐以來至于今日則七閩之儒風為盛且駸駸而逾廣矣是又何歟曹奢魏褊以至桑間濮上之淫聲則自古中州之文其未粹如此西晉之末中原雲擾瓜剖豆分幾三百年而後熄靖康之禍且九十載矣又淪為兵戰之區其文安在耶是可不求其故歟西河之會周人分陜之所也何諸侯之會不于此而于東都歟虢之與洛相去幾何秦總之為三川一郡漢則析為𢎞農又踰河南郡而後為陳留則視之亦遠矣然則虢果中耶洛果中耶敢併咨之幸詳以告三條四列兩戒地極小而囿于天者也地理之學反甚難于天文蓋天文回環周歲而二十八次與夫紫太二微天市河漢者盡在吾目中矣地理非足迹所到不可窮知按圖而考模稜無定豈如目力之親詣耶故嘗觀禹貢導山而有疑焉三條之説其昉于馬融乎前此矣北自岍至于碣石自西傾至于陪尾南自嶓冢至于敷淺原鄭康成之學出于馬融又以岷在梁州之西境而嶓處其東岷與大别本不相屬詎可合而一之于是乎有四列之議其正隂列則其北條也其次隂列則其中條也以嶓冢貫之大别為次陽列以岷山貫之敷淺原為正陽列此其反于師承者果是耶若以為是則魏人王肅不當去鄭而從馬矣且地脈最難尋者也鄭果何信而增其一王果何信而歸之三唐僧一行又皆以為不然而立兩戒之論且謂星傳以北戒為胡門南戒為越門河源與涇渭濟瀆相表裏其北河者也江源與漢水淮瀆相表裏其南河者也此其南北不斷于地理而斷于天文以雲河之上流在西北而下流在東南其信然歟不然禹貢之于山也秖言導者二焉何歟兹世儒所謂實學者也試相與講明之厯厯數之興推步乎天文而撙節乎人文者也有天地有生民不可無厯數之學月有盈虧物有盛衰氣有寒暑巢居飲血之民足以觀天時而已厯不作可也人文既繁桑麻榖粟之功吉凶土木之役歲時伏臘之禮無事而不關乎厯此容成大撓之算所以與吾道同出也天旋而西日月五星動而東髙且遠也千歲之日可坐而致巧厯之用神矣哉然自有六術以來至于太初凡幾變自太初以來至于今日凡幾變天之髙也星辰之遠也似非巧厯所能得何哉三百六十五度四分度之一童子可知也巧厯所不能得非少強之謂歟迎日推䇿孰不精于此哉然則非少強之謂也有象然後有厯二十八宿去極之逺近以舊經較之唐以唐法準之今所損益可知也經然爾緯不然乎物之大也久動而必差久差而浸失審乎日月之行新之而又新之斯可矣故治厯明時聖人所以係于革法非一定可以久因而不革者其信然其有數而古今皆莫之致乎依于律據于衍前此矣何獨無所聞乎豈唐都洛下閎一行之學不如重黎羲和之精故有待而然乎厯家之算始密而後疏泝而上之春秋日蝕有甲乙者三十六而劉歆得其一理之必然也李淳風考之則又皆得春秋以來之薄蝕孰得孰失二者必居一于此矣甚哉厯之數難究也古者推測多至三百年或百餘年而必變唐始終二百九十餘年厯凡八改何耶國朝以來則已多于此矣曰應天曰乾元曰儀天曰崇天明天未幾而奉天出焉觀天未幾而統元出焉自統元而為乾道自乾道而為淳熙何亟變而速改也乃者復詔諸道搜訪清臺之士猗歟偉哉堯厯舜璣當有得于意表者諸君所習固非充是選也然員冠之飾其詳雖不得聞請言其略閏隂陽之變有氣候日月之行有晦朔二者交相證而厯數自明乎天地之間星官厯翁操觚運算百變以求常瞪若乎其後矣重黎羲和古者朝廷之要官後世處之以雜流不得與士大夫伍何哉厯學初出尊之重之久自知其無難事矣然古之所謂重黎羲和者其或有道不專乎技未可知也蠻陬荒徼或精此數多矣是非儒者之所上雖然不可不講也是月也閏試與諸君言之堯典曰以閏月定四時成歲非閏月則四時不定歲不成乎曰是固然矣合六氣而為一時合十有二月而為一歲明生魄死三歲之月且不止三十有六焉故考二十四氣而知閏月之所在以其有朔而無中也以閏月定四時成歲堯典之言也以四時定閏月竊又嘗為是言也且三百六十五度四分度之一周星之數也日日一度月日十三度十九分度之七日之行二十九度而月之行已為三百八十七度與夫十九分度之十三矣一遲一速故一歲會于辰之次者十有二而月之行猶有羡此其所以不及三載而剩為弦望晦朔者一焉閏之所由生也月雖有閏而其為二十四氣者一定而不可易以節氣而定四時以閏月而行正朔推步之術或差毫釐而灰飛炭重可以驗氣明生魄死可以視月竊謂算雖不密而天地之數常自如已昭昭然示人矣厯不必求精可也然頒朔授時定歲首以行典禮天子之事如是耳故不得不精其法雖然閏蓋易考也日分析精則閏定矣嗚呼日法無他繁也約也二説也漢初用顓厯其為法也八十分次改太初則增一分最後又行四分以至百刻無乃太約乎唐初戊寅厯其為法也萬三千六分次改麟德則減為千三百四十最後大衍則三千四十無乃太繁乎或繁或約屢差而屢變矣然則日法九百四十分推之十九年一章七閏其為大者四小者三如何耶是果酌中之數乎或者以為此其大概也又不足以盡閏法是果然乎與夫居門闔扉秦後九月文不告朔併陳所以願悉聞焉律聲出于氣氣在天地發而為聲則雷霆風雨是也人以氣化金石絲竹匏土革木亦以氣化八者之鳴人實鼓之庸非氣之所觸乎故天地人之籟莊周所以見道而言而竊又謂地籟人籟總可謂之天籟也管之髙下本以候氣樂律生焉樂也者逹十有二月之氣以盈乎天地之間古之人謂樂以導和者豈惟導人之和哉亦導天地之和也矣如是則議律不精而天地之氣其和必乖可不毫釐致謹乎三分益一至㽔賓而重上生分寸多寡次第有倫班固易之錯雜無序是非可見况至乎中吕其數太鮮豈若三分益一能上生黃鍾而與之為無窮哉班固之必爾非無所傳授可得聞其人歟五聲十二律旋相為宫六十生焉猶八卦之為六十四卦此雖京房得之焦延壽之所得者古也古者聞有五音矣未聞有七音也七音昉于隋之鄭譯謂周武帝時之龜兹人則其所自來乃援漢律厯志七始之説于是乎有八十四調百四十四律而終之以千有八聲羣議力排而譯之説廢矣至唐貞觀始行焉貞觀之樂成于祖孝孫然雜用吳楚之音多涉羌戎之伎者孝孫也八十四調果當乎今之樂有變宫變徴則仍唐舊也七音相傳而人不知其五音之六十律者矣前之説是則今之説非前之説非則今之説是二者必居一于此諸君知之乎則班固之律未必知也郊郊重事也以三歲之久乃敢一行其禮自漢而後益重焉雖重其事而神明位序之髙下且講求而顚倒是尚得為重也乎雖然豈以為顚倒而行之亦必有説試舉而質諸恭惟國家郊禮多沿唐舊唐自蕭子儒輩以昊天上帝即其蒼蒼者爾因序耀魄寶于五帝之下然則太微之五星其果尊于紫微之北辰否乎既以五帝尊于北辰矣今以六院正録分獻之可乎且我火德也赤熛怒若熒惑若心爟皆當時所崇尚何以例之而不别耶天文有與黃帝同號者聖祖别名也易而謂之權我得火運而權居朱鳥之次則其别名豈無所自來是固不當尊之乎列于西廊下龕而厨牢勢理居其上是何也商宋星也宋為國號趙為國姓吳越駐蹕之區皆當特祀而不特祀是果何見歟勾芒祝融蓐收玄冥后土五帝之佐爾五帝猶諸侯而其佐則諸侯之大夫皇祐露幄于庭中今與北極天皇同處壇之一等殿之兩垜不惟三公三師上台上相下之而天王后妃太子亦下之何耶妖星之見于史傳者三百餘瑞星三四爾周伯其一數也以其躔度錯于五緯之間晉隋二史舉張衡之説為然則其尊同五緯不然降之一等耳五緯或為貴相或為上公此以伯名亦非春秋之所謂微者祖宗朝次于氐宿壽星之間猶可也今而置諸車肆鍵閉宦者之列其故何歟隋唐以來以二十八宿之內星處壇之上等牲牢酒醴之數豐二十八宿之外星處之下等牲牢酒醴之數損天人一理內之府史特有重于外之嶽牧耶烏可國朝沿唐而有不沿也者尤可疑壇之前列內官雖多而錯以外官左更右更秦爵之初等處焉堂之後行外官雖多而錯以內官天相處焉是又何也既祀帝坐矣又有中帝坐既祀黃帝矣又有黃帝坐是果鹵莽而重煩歟否也紫太天市之環衛以司馬遷天官庾季才一行蓋圖景祐新書蘇頌法要考之當分三十有九祀而今也明堂郊丘三祀焉闕其三十六位之天神是果疏略而脫失歟非也周司冦有司民之祀權之兩角是也天府有司祿之祀文昌次四之星是也今乏焉又何也漢志有維星天下之綱維係焉乃闕其祀太白之詩有酒星即酒旗也而又增之其他闕祀不可勝舉若以神明杳漠不可得而盡其區别之詳則古人于此亦未嘗茍也諸君討論必素其有備他日顧問者幸先以語我禘大哉禘説之難明也亦難解也六藝折衷于夫子春秋書禘若曰吉禘于莊公若曰禘于太廟則安得為郊祭也鄭氏注禮果何據而云爾哉正義謂禘非一記于小戴者為郊而書于經者宗廟爾注也正義也然乎鄭以大傳者為感生帝以祭法者為圓丘昊天又有是乎無是乎春秋夫子之親筆戴記雜出于漢儒春秋既晦于三傳今請以戴記而折衷之大傳小記皆曰不王不禘春秋書禘毋乃斥其僣禮八佾舞庭之意歟若以為然則季夏六月禘祀周公尊罍樂舞一一見于明堂位何也語有禘自既灌而往不欲觀之辭傳者以逆祀訓之故杜氏以禘者諦也審諦昭穆而已矣或曰禘者審也審其祖之所自出則古之以其德而帝者誰歟是其所祭者人帝也非天帝也若是則自虞至周禘四人者而惟黃帝與嚳何耶是難喻也况祭法謂商人禘嚳求之商頌長發為大禘之詩自契至湯歷歷言其事而無一辭及嚳何耶且三年一祫五年一禘非禮緯之云乎或又謂猶五年再閏是五年而二祭非祫多而禘少左氏杜預又謂三年一大祭為禘禘即祫也其説紛紛何所定耶雖如聚訟必有至當之論明堂觀孝經而知明堂為宗祀之所又觀七篇而知明堂為行政之地古之人廟曰清廟則堂曰明堂寧不為宗祀之所乎是取清明之義也易之離曰向明而治則堂曰明堂寧不為行政之地乎是取陽明之義也然則明堂也者一物而兩用用雖異而實則一何以言之耶以平日行政之地為擇日祀天之所每其臨政也曰吾祀天于此詎可以代天為政而騁吾私乎及其祀天也則曰皇天后祖洋洋左右吾平日布政于此其果有愧乎無愧乎是一物而兩用用雖異而實則一也明堂制度見于考工記之匠人明堂之用見于小戴禮匠人所載甚明而簡如指諸掌自漢儒唱説不定而其後紛紛始難適從九階重屋四戶八忩言其儉者以茅蓋而從其侈者以金龍甲言而乙不服前興而後不循然歷代久矣其間必有得失制度之當者其人可得聞歟黃帝曰合宫有虞曰總章非應劭之説乎合宫總章則用之以聽政也然小戴月令天子夏居明堂而秋居總章則二物而已矣安得以總章為明堂乎月令孟夏居明堂左個仲夏居明堂太廟季夏居明堂右個是則明堂之中有太廟也及考之明堂位則曰太廟天子明堂言魯得用天子禮樂而其太廟之中有明堂也今不知明堂之中有太廟乎抑太廟之中有明堂乎合太廟而言之則用之以祭祀固也明堂之中有太廟則明堂猶可以祀天也若于太廟以祀天寧非褻歟季秋大享朝廷間行之制也試因以討論其大略廟祧親有久近則禮有隆殺原人之情則未始有限也以無窮之情而節之以有限之禮不惟賢智為然雖萬乘富貴豈得不由天下之中制歟嗚呼以聖神之資席崇髙之勢有事親尊祖之心而備物足以行禮雖百世祀可也而廟極于七過則祧焉天地節而四時成凡天下之事未有泛然無涯以往者也廟有祧非不易之禮歟然在人有無窮之情則有可以祧可以無祧而七世之限不能無議論出入于其間也夏五商六發于鄭康成之口而唐人又以周為九廟則三代之制由諸儒遷就其説已無定論曷免後世之紛紛乎前漢以髙祖為太祖是矣以孝文之德為太宗或可也又以武帝之功為世宗果為合于人情歟後漢于世祖之廟七主而髙廟又五主焉又有所謂之陵者蓋莫適定其去留也唐自四廟而六室又自七室而九室乃極于九代十一室蓋或以兄弟先後為昭穆或又以兄弟不當為昭穆嗟乎兄弟相代之法不知商人何以處是歟恭惟國家自僖祖而下至仁宗始備七世故英宗朝嘗遷僖祖矣熙寧又以僖祖為太廟始祖而還之果合于禮歟哲宗之祔當與神宗為昭穆禮官所議不遷宣祖而乃更增一室四昭三穆為八世亦果合于禮歟戴記祭法祧惟有二而且有增墠之制或者非之非之當乎否也或又謂七世之廟可以觀德蓋言享世長久者然後見其先代積纍之盛非謂廟止于七而祧之為言豈帝王孝祀之思廟則本無祧也若然則周禮建官而有守祧之人何歟封建秦以周人分裂之變而始郡縣漢人以秦孤立之變而又封建世有是言也然秦置郡縣真懲周也漢復封建豈懲秦耶栁子厚著論謂古初封建非聖人意勢也至湯資以黜夏武資以勝商又不得而廢則商周之封建乃亦湯武之不得已也噫湯武封建且為不得已漢之封建其果得已耶吾固知其非懲秦之弊也審矣且濰水一捷而南靣稱孤之念已勃然于向時淮隂跨下者之心况黥彭環視何止一信漢祖能勿封建得乎顧假王之請方發諸吻而漢祖之髮已衝其冠當是時也可以無封建髙祖豈樂為封建耶嗚呼封建真非漢人意不得已也故功臣之王者地既過大而侯邑且多為漢人者長慮却顧能不大啓同姓之土宇乎儒生之論且謂藩國之大跨州兼郡連城數十以為矯枉過正殊不知漢人一時姑為自安之計爾何暇其為矯枉計耶縱使髙祖知學又能挈周制以限節此時耶俗儒不逹時宜好是古非今宜乎漢代人主厭薄之也雖然事勢之在天下其初不能以萬全者智者深謀潛移隂運變而通之其終無不為萬全之計患在智有所不及耳衆建諸侯少其力賈誼非智者之謀乎趙祈可間齊分為六文帝行誼之䇿止于齊趙二國爾使文帝用誼之策如武帝用主父偃之謀七國之難吾知不作于景帝之世矣惜乎禍患已見而後智者之䇿行偃襲誼故智爾如使七國未變則武帝用偃之言未見能明于文帝也然淮南謀叛矣濟北兵反矣文帝亦可以早辨而吳王几杖方且示其寬仁之度帝于此機昧亦甚矣嗚呼物理推移極無不反至建元二年雖中山王勝泣言懇到終無以救諸侯之勢衰豈惟人謀亦天道也然至于王氏之變漢莫支梧而史臣推原其故又以為諸侯削弱之致若是則賈誼主父偃之謀非耶天下之勢若何而可以始終無患也向使推恩王子弟之説早行于七國未變之初人主無懲羮吹虀過防之意則其封地可使漸如周制而皆不奪其兵權王氏果能騁其姦謀耶懲之太過奪之太甚雖無尾大之慮而枝葉翦落何以保其無意外之患也是説也何如幸反覆細詳之封建井田聖人不能立無弊之法聖人雖能立無弊之法亦不能保其法之無壞法必有弊若無弊而必壞則何以善天下哉所恃變通之術耳古者封建誠天下之弊法也栁子厚謂有并吞之患蘇子由謂有篡弒之患若此二子而見漢髙宣之二君孰敢解其冠而溺之以為好是古非今使人惑于名實者哉人如王仲淹未可以腐儒俗儒少之也酷恨封建之不復何耶井田非弊法也法雖無弊然便于民而不便于暴君汙吏故齊之內政魯之稅畝田賦皆壞井田之漸至戰國而無遺矣故孟子思不得見而拳拳于經界之行世以秦人破封建廢井田殊不知封建者自弊而井田之壞其來久矣秦人獨當其責何耶郡縣既開世無篡弒之患誠如子由之所謂矣竊嘗歷考世變又見封建雖破而未嘗破有罷侯置守之名而不能無侯國戰爭之變嬴政既失所在紛起依然為六國之崢嶸東都之末牧守環視不用朝廷之命而曹氏卒移漢鼎其視周衰諸侯強大之勢有辨乎無辨乎晉轍既東戎禍縱橫于西北二三百年或離或合自元魏後周北齊之外猶且為十有六國特皆跨有數州之地而已非亦有封建之勢耶唐人何嘗封建而遽有藩鎮之憂藩鎮之有偏禆正齊之田氏魯之三家晉之六卿古今天下成敗之勢如數局棊要其大指亦不出此一説何哉唐季五代之間而四方離為十國古者封建之弊果存乎否乎封建已不行而其弊乃不革何耶古者天子有叛諸侯諸侯有叛大夫所謂盜者特穿窬之細耳未有一夫唱難而千百人從之以嘯聚者井地行而民有常産及無常産而後無常心放辟邪侈無不為已跖之有衆在春秋井田已壞之時也自是而盜賊之患至有數萬人者無世無之是封建破而封建之患存井地廢而盜賊之患又生此後干戈之禍所以益多于前古噫封建之法行諸侯大夫有土則有民有民則有兵非天子付之以為盜之資否乎井田之法壞百姓無為生之具而廟堂不為之慮飢寒切身而突然四出非天子驅之于為盜之塗否乎今欲郡邑永清而無古人封建之患井田不復而無後世盜賊之變必有術以變通之然井地之法雖曰人皆受田以耕而周以九職任萬民又有所謂間民轉移執事者何民也有間民而不從大盜何耶欲併聞之樂軒集卷七
