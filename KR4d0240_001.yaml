body:
  text: 樂軒集卷一宋陳藻撰詩讀莊子堯無是處桀無非此語堪驚與道違造物恩私多嵬瑣始知莊子得真機偶游白渡懷劉九心隨飛鳥過寒沙兩岸沿江曲又斜便有隻船乘月渡都無五里到君家寄劉九一生閉門不結交夤緣遇我如同胞年年客裏故人多飲水逢君朱顔酡鵲去鳩來有空屋牝乳雛飛無啄粟香火飄零甘死休無辜憐我兄遭戮暗中魑魅籍姓名我有朋儔等不足十事上心九事忘一日回首千日長誰登百丈嶺我到鍾山傍登堂拜丘嫂攜手戲諸郎諸郎挽衣幼女親汝母磊落如吾人哀我若見韓氏孤敬我寧知蘇子貧吁嗟尺布謡空道天屬真寄劉八六度封書向小孤一度逢人寄書無劉郎嗔我無短吟素書百紙難論心我愛劉郎可無詩劉郎愛客還笞兒我為父執倍其年見我呼兄挾渠賢撥棄勿復陳對君吟此身憶昔在桂堂瘧鬼罹我殃世情疏客病移我君家床兒女不辭勞僕妾何憚忙秋風黃葉飛明燈藥爐傍我身何日殞此念何時忘丘嫂晚歲歸敬我如小郎他年山下結吾廬朝暮往來摩白鬚我抱子君抱孫却使相敘為弟昆黃石還漁溪寄劉九四首孤青湖外幾時歸想極吟孤落月知身似南飛烏與鵲歸來何處不相思多少人家好弟兄不堪閨婦似吹笙十年再拜如丘嫂更盡劉郎故舊情老去今秋迹轉孤憐君幼女似童烏窮通何事關渠甚便問明朝有試無南北東西語别頻白頭何計作比鄰便留久客如前度無暇長年作主人久不得劉九書因題寄之劉郎蹤跡若為踈蟹井山前似里閭少小麻風今半愈長成項疾喜全除豐年誰與嘗新稻吉日因知反舊廬何事别君才百里可堪終歲斷來書重山論易贈吳叔達似汝論三易何人閲五車白頭長作侣黃石即為家丹井懷叔達喜稱吾子賦羞道少年時别去休論易愁來欲寄詩夕陽書不到殘月夢相隨晚歲傷心事松峬獨語誰憑欄少壯營營正苦心憑欄況味不如今如今飯散憑欄立一本寒枯木在林桂堂秋夜熒熒燈火臨書卷續續蛙聲入桂林背後曲肱眠小子床頭酌酒服𤣥參題劉氏翠微亭舊屋紅蕖外新亭緑樹傍江晴孤棹見雨近衆山藏學圃未成趣催詩何太忙他年多橘柚此地一瀟湘誦少陵詩集麻鞋奔走杜陵翁卧盡風帆雨驛中天也不愁窮餓殺年年催促要詩工福州城北吳氏新樓之作千山匼匝繞三山盡屬危樓一覷間雲漢星辰誰道逺鄰家花木不容慳憑欄要取西湖盡落葉尤宜朔吹寒況是先生莊列輩眼髙人境幾層看過黃州訪東坡雪堂遺跡擬作謫來誰作久長居便擬明朝歸舊廬誦遍離騷情不已讀殘鵩賦恨如初斯翁直是憂黎庶到處仍看似里閭父老無人堪問訊黃昏立馬轉躊躇寓居到處情親即寓居從他相狎又相疏年衰骨肉多埋土身賤交朋少寄書萬象去來無了日一元開闔不關渠逢人問我今何在寥落空山誦子虛述懷病身四十未妻孥墟墓那堪兩世孤黃卷安貧無陋闕蟹井此山鼇不動此井蟹如何小阜為拳石晴田看盡波俯知雲障下却放日輪過一上一回首層層眼界多虎丘竹瘦門逾靜樓髙山太低白煙青樹走細雨大江迷野水東西渡園蔬上下畦僧無城市去岩有鬼神棲山中有感每看風月非人世錯認江山是畫圖誰解吟詩追李杜何須涉海訪蓬壺城山偶題四天圍一地濁少判清多人氣翻相敵無如俗物何漁溪西軒千尋好景羣峰起一抹寒烟半壁留日影漸髙魚網曬雨聲長響桔橰休種麻賣布皆貧婦伐蔗炊糖無末遊狂客寂寥貪看月初旬已看月如鈎紫瑞香三首中開素粉笑濃霜外帶凝脂妬夕陽縱有寒梅秖一色暗香不似撲人香無數枝頭簇簇葩大枝直上細枝斜商量開盡商量落全要前花見後花放蘂爭先見菊雕逐花旋拆到桃夭若為耐久還柔脆莫折仙枝本易搖丘叔喬七十生朝二首人生七十為稀有强健如公有幾人況是上元燈火夜兒孫楚楚賀生辰大兒别有論文眼朴實無他是次丁長女嫁夫能儉約小娘罵壻見財輕與宗上人同飲同年同月又同時邂逅僧房把酒巵五十年來未相識鄰州兩舍賀生兒試後自題因送從弟敬之赴省銀袍二萬縱人多筆誤無如鬼魅何秖恐有司長莽鹵那知昏病自蹉跎交遊解散文因怪門户誰興鬢欲皤賴有阿連才思逸乘槎好好上天河貧婦行故人身死妻貧病買藥無錢留性命半簞赤飯一盂蔬對不能餐雙淚迸阿官賣田妾未歸稅在夫家田賣誰鄉胥改割全隱匿妾典衣裳空被追零落生涯種片園朝朝夜夜盜開門鄰翁苦妾妾租客客也無輸呌妾論那更雙棺四缶灰伐山博米圖葬埋嗚呼豪强欺妾奪山去不許鹽丁燃妾柴十歲孤兒出縣庭空手攜狀投杳冥黃堂走罷走使軿文書送縣已三月依舊含寃說我聽問太虛生前百事無如意死後浮名總是空剛把窮愁作題目哦詩不要晚年工西窗晚眺兩年無事坐窗間數盡西邉不老山薄暮忽迷雲與樹驚來乍見别峰巒海口吟按圖自古無人到二百年來户口添架屋上山成市井張官近海課魚鹽估客趂潮撑米入沒人忍凍采蠔粘仲尼有廟塵誰掃寺觀崢嶸香火嚴和林子望二絶勸君莫要嘆無官門廕何如自致難誰肯宦途為第二玉階好好唱名還勸君莫要嘆無官幸有田園在故山滿室清風滿林月人生何事勝於閒劉五十丈生日與君他語自差殊獨愛交財是丈夫願見年年生日㑹老來活計尚關渠雲菴覔詩百級危階上翠巒四邉山色自低環海鄉無限蕭條景收到樓前是美觀一古一律賀懶翁宏仲七十醵飲髙堂慶古希名存實是節常儀百篇自號懶翁詩一句誰吟持侑巵我見前程多險巇朝聞夕可寧不怡健如此叟更待時黃金散盡呼來歸當年嗽卧丈人家鼓笛村村改歲華選肉必多儲胃腎忌鮮緣不啖魚蝦閨房德義談雖切事業身窮報自賖肺疾晚侵誰是主看君七十更寒些次子望肯堂之什酒樽開處是陽春有屋休論舊與新才子緑袍能賦詠乃翁青冡亦精神人心多向醒時僞情話無如醉後真莫要孟光同遁去急須榮祿奉偏親陳叔盥兩惠詩以一首謝休要逢人誦六經紅泉往事已凋零向來未壞恭王壁到處閒搖普化鈴幾歲寒窗頭也白兩篇新什眼空青還鄉舊識多農賈那得柴門自掩扄穀城山下作逺來便見兩山暌一大隆髙一小低及到近看如合璧壺公祇與穀城齊城山讀書雨響泉流樂不如月明松柏勝旌旟誰能五十猶勤苦秖向山間受用書送年一味清貧好送年堪嗟柴炭買無錢生涯幸與干戈逺不管天明聽雨眠秋雨早禾收罷晚禾青再插秧開滿眼成誰道秋風專肅殺依然四月雨中行林若愚七十思我從網山問道紅泉市託翁自漁溪餉我百餘里數窮初值變巢穴夜焚毁我恰還君家曉霜失行李君家一物無宦學吾請已艱難全信義勉强圖終始三載客招提饋遺無廢弛薄莫聞叩門奔走勞僕使先生顧之笑以我匹子美他時誓作銘自送此老死新春方七十行步追鹿豕犀斜宿草多惆悵餘一紀幸有活頭顱見君松竹比屈伸隨變化貧富休悲喜人生飽諳厯熟識興衰理身佚心鎮愚千歲焉用彼網山先生諱日寄綺伯先生一去三十年蘋藻聊修諱日䖍雌劍忽尋雄劍逝恰恰歲暮吾無錢乃知毫髮有造化此禮終與吾毋緣人生損益固常理韓門仍被流俗牽鳯毛辭采非不美再拜焚香符水前驅邪院中諸將吏或書或畫縱橫縣網山有靈應大笑安得師友尚流傳三教枉費工夫是學仙聖門妙處與僧傳百年合死千年贅一物都無萬物全贈叔嘉叔平劉丈士多貧者試後皇皇誰得失蓋其衣食在科舉耳叔嘉叔平揮染而歸理生自若衆所健羡贈以古風一首木槽壓油三石餘半為燈火半煮蔬上山伐柴五十束九分賣錢一燒肉等閒八月舉場歸早禾囷畢晚禾稀道行願見國人肥髙才久屈當奮飛萬一主司仍見遺課奴種麥家相宜老夫借屋蓄妻兒寂寥慣便亦何悲丘德基七十斯翁千歲也何愁七十真堪賀禮修多少人間貧病客不貪天地久相留賀丘子從遷居老夫昨者亦遷居只是他人借屋廬道義交親無罣礙妻孥慮逺自嗟吁乃翁能殖千金去令子均分甲第餘醉卧市心年月久南橋依舊賦歸歟賀子永為令郎醮婦咿呀喝擔禮筵開無物聊堪表下懷天遣腐儒人事省三冬不放一錢來將有逺行走筆效江西體贈叔嘉我非無伴侣少壯皆黃泉獨我成小巫何人呼大禪有時欲覽月誰與為飛仙萌芽一二輩世俗輒變遷之子略可語猶之火未燃淮浙有同調已辦青鞋錢適武林入延平界作人烟隨山窟家家自生理木杪插秧青泉流仙杵起開邉憶漢皇航海通南鄙黃昏更不愁客舍連甍美建劍風土瞰水比連閣開山上下廬四時篁有笋兩岸鱔多魚白苧男抽剝新絲女捲舒吾曹嗟跋涉不合早看書除夜過延平書所見東家兒婦試新衣西家殘織方下機東家宰牲嫌不肥西家呼兒去采薇欲掩不掩留半扉等彼良人心依依小兒出門看落暉平章去時霜未晞須㬰忽見扁舟飛雙漿㩇破清漣漪抖擻裙兒牽兒上釣磯手掩蓬鬢漸覺面生輝遽呼良人何來遲稅苖更管中限違且買豚肩連夜歸過蓋竹祠人心有想自然靈夢寐之間兆眹成蓋竹山前英惠廟暗中贏得四方名至浦城界聞武林失火而還幾年要入武林遊今日中塗却罷休剩得紀行詩數首前途有便是良謀新村阻水前途聞火整裝回又向新村值水災縱道人生為客好這般風味稍關懷看船迅步如何却放遲貪看船子下灘奇身貧也守垂堂戒自覺年髙命未知由建陽抵浦城界遂歸崇下臨溪行盡却穿山山盡依然出水間崇下不貪歸去近最憐山水要環看浙漕不成還勉諸同行此去相期泰茹連歸來鄉舉賽登天秋風少壯猶堪想人閙何由識老顛擬别為浙江之行兩浙夤緣未聊窮福建回雪鹽晞黑土朱李細黃梅男子皆强鬬村姑亦懶腮在家無活計此路缺芒鞋歸入古田界作步步溪山勝橋亭建劍風土宜辭荔子村塢盡油桐南店炊初滑西舟石漸窮豈知旬日外便訪去時蹤同行歸急困倦不能詩行李放遲遲周遭好拾詩歸程催我急腳力與神疲來往成虛費科名未有期流傳堪膾炙造物不相虧觀漁船水碓有感水淋槽滿舂應響人降槎登網自沉萬事低昂惟兩勢乾坤闔闢箇中尋建劍板橋之什數里一板橋亭欄各清楚長亭且百間頻憩忘羈旅人道賁乾坤溪山失其阻莊生達未充無梁思太古行行降復登川廣湍流聚急下看飛船髣佛聞端午適武林途中作道途奔走固然非閒坐真空度歲時誰解胸中無窒礙兩隨造化不相譏道中酒壚千村亭榭酒旗揚收盡山光與水光風物到來城郭閙杖頭隨處去休忙夜宿溪館偶成世間多福是行人到處風光屬此身戲效堯夫吟數首芒鞋楮蓋不知貧夜宿延平水東二首晚向溪西岸上行溪東一帶水為城兩山相距能多少聽盡傍邉呌賣聲浮橋暫拆阻狂瀾懶問津船趂往還雙劍廟前酤酒喫水西燈火水東看山泉山山迸出細泉流更瀉髙峰瀑布幽盡入大溪灘石裏古今翻覆幾人舟建劍途中即事山化千般障田敷百級階林杉森似㦸灘水呌如雷蔬笋常供膳雞魚間有杯吾鄉多食物女慕白粳來田家婦蒔秧郎壻晚歸來白面勻粧是乃妻笑說福唐風俗惡一田夫婦兩身泥過建劍書所聞見日夜灘聲急相忘不閙人兒孫猶棄水農圃各文身眼出平洋豁眉逢大雨顰溪藏山脅裏繞水每逡巡過建劍飲食賣食鮮雖少開酤賤却醇不知天地裏何處享全珍早下蓬嶺烟雲深裏日攀躋嶺上宵眠雨電低清曉攜笻遵下路髙峰對面與胸齊過江山作叠叠青山相送迎繞溪幽樹萬蜩鳴我來場屋無聲字也在神仙洞裏行自哂自小何曾識帝鄉姓名却挂武林廂祝融今歲為災甚亦費資糧奔走忙看潮何處飛來白鷺多潮頭已減數分闕西旋衝却東流散陳陳將軍引戰過重陽臨安舟中作小船獨坐看平洋厯厯登髙舊事長戲把此身觀變化今年無酒過重陽到平江遇雨次日見元鼎揚丈此來便擬見揚雄席帽那堪走雨中漫刺修成還自袖髙門許入不能通姓名多謝曽相問糧屨從今未解窮孟子休須嗔樂克無車只等日輪東贈揚元鼎老泉早别閩中去君在姑蘇臺下生每見鄉閭新到客便尋香火舊來情百年念祖心田孝一種論文眼力明歲晚已無場屋纍古書真味勝浮名平江清明書所聞見早插緑楊簷外去晚攜黃胖杖頭歸富者幾家貧者衆年年漸見賞人稀平江課賦待試混補蕭中立見之有相憐色因成四韻吾鄉猶自哂吾徒易道東來話得無幸有蔡雍過㸑下獨憐賈島作原夫昌黎俗筆何曽短永叔文衡不到輸多少科名成底事聊安飄泊老江湖鄭簿約飲不赴以詩謝之浪遊人到北佳節日窮南多謝棲鸞意相期泛蟻酣桃源迷去路玉麈失清談寄語鄭莊驛難逃負約慚寄叔嘉叔平秋暮家書到武林平江臘盡未聞音兒添一巽還三艮詩賦雙魚抵萬金故國桃花應爛漫北天梅蕊尚沉吟橋門待補行新令早趣行裝慰老心讀李翰林詩杜陵尊酒罕相逢舉世誰堪入此公莫怪篇篇吟婦女别無人物與形容鄭主簿宅看雪訪梅聽僧撫琴偶成四韻倩蕭中立書之鵝毛散亂三朝雪烏帽沾濡六出花梅吐萬枝香滿室桐聽幾曲興乘槎蓬萊借問仙仇覽人世何妨醉釋迦騷客平生揮字拙蕭郎為我走龍蛇呼盧年少相看百慮無才過旅邸便呼盧熱中更不知行李却把黃梁付老夫賦京口蘇園揚子江邉犬吠村蘇公宅畔蝶遊園滄波對景標層塔野市逃喧植外樊亭榭髙低隨卉木門庭光彩屬兒孫本朝名相青氊在傍築書齊細討論十月一日毗陵作聽得常州多菜色到來市井亦安然今朝正值焦糟節車馬翩翩上墓田題東湖林氏所居逺來東望見門墻到後西看不見洋四面近山圍繞密卜居如此合綿長平江送連亨叟赴省吾廬元在亮功坊祖母東街家姓張舅翁官小先富强有子破蕩開書堂我隨表伯學文章忽然好怪不好常走師月魚舍莆陽三山士子厭我狂避我談吐如簸糠北郭先君吳諱驤姨弟余入京朝行惟此二人見科場期我前列每參商面嗔考官識未長我因隨老客他鄉一錢亦缺真空囊君出鳯池遊上庠長洲適值日同房我憶東街往事詳得君情話勝瓊漿百杯飲我何以償欲餞一醉難賖嘗雖然旅困顔無光狂言欲發藉激昂自矜到此亦可傷末篇聽我送行裝臨軒策試亮陰妨首擢南宫丹桂芳奉常格法經先揚亞魁誰賦非君當占牌前引歸騎忙藍袍色映萱草蒼美人二八宫樣粧閥閲貴盛金多藏愛君坦腹羲之床紅紬扇鼓迎新郎我還盡糶簞食糧賽君痛飲尋歌娼莫學淺夫唾肥羊傲岸賀客峻門墻冬至寄行甫騰叔江浙羈棲怕雪霜早年聽得晚年嘗生涯敗意多諳厯節序隨緣少感傷鴨肉餛飩看土俗糯丸麻汁阻家鄉二千里外尋君話今日那堪各一方贈王叔平龜山與我說於潛忽向平江問酒帘何日龜山山下坐共談江浙擘蠔粘贈蕭中立相逢知己向非無木未逢春一樣枯雙眼如君今有力困窮那得到狂夫平江臘月草五夜作昨日宰猪家祭竈今宵洗豆俗為糜燔柴夾水明如晝截竹當階爆禦魑故國賽還新歲願老翁回憶幼年時才髙命薄天相戲我亦剛腸不肯悲除夜寄妻叔劉丈一自鄰居十二年幾番為客更從前入同飲酒柴爐畔出看呼盧竹爆邉鼓吹兒童隨處閙庖㕑烟火幾家眠今宵莫恨輕離别此地蹉跎豈偶然元日平江作草粿京糰要賀年玉融風俗不同天元正卯醉長洲市又憶浮家厭海鮮寄叔廣君在於潛未語歸姑蘇我到事多違母衰妹弱那能幹婦拙兒頑孰可依海近一天風漠漠朔寒兩地雪霏霏行裝稍辦還家急年少應須慕虎闈平江送王騰叔交情早已有何蕃為我揚聲梁楚間秋暮姑蘇身自到春來行李處猶難十年為客思親切一第從人奏凱還莫笑衰翁頻鑷鬢雕蟲更擬入賢關别平江揚元鼎二首染指黿羮有子雲乃能留客話皇墳不知造化何慳甚遣出平江要别君黃菊來時正繞籬真柑續到蟹偏肥嘗罷河豚歸楫動消梅初熟栁花飛壬戌重午於潛李氏作我來於潛縣知有老聃族王氣歇唐家孫支散幽谷居然多仕版壁列登科録生兒皆可愛大小芝蘭馥大者初試歸兩眼如明燭小者才讀書應對機鋒速他鄉客重午菖蒲隨飲俗老去卧家山如夢開詩牘土風錢塘直出過長洲質直都無俗太浮路入餘杭昌化境土風淳朴似閩甌道中戲嘲朱叔緯畏日在征途心涼不知苦青山千百態相契無相忤芒鞋有至貴道眼開方覩行行遂吾性萬物與同祖殺雞固不忍從衆那得阻嫩菜送香粳頗覺清肺腑同游自疏懶共飯何嗔怒詠快活三首客舍寒窗月色明紙衾展罷睡縱橫傍人正是無聊景怪我狂呼快活聲小船密坐頸難伸盡是飢寒不遇身快活幾聲天地裏相看疑我是顛人武林試罷過仙霞行路崎嶇各憶家怪問老夫何所喜飄搖飛舞似楊花歸入福建界作行旅名雖惡遊山興亦深酒無官𣙜價松有道傍陰鵝鴨溪溪浴蜩蟬樹樹吟逍遙儔侣怪罵我失常心甲子應舉場屋悠悠四十年這回弄鏡已華顛也知枯木春稀到却想寒灰火復燃髙尚難攀生有纍往來莫厭喜隨緣傷心自是離鄉客幾度因歸上墓田樂軒集卷一
