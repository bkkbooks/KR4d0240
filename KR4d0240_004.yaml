body:
  text: 樂軒集卷四宋陳藻撰賦菊花賦律中無射兮其聲商以髙金飈遒徑兮朘百草而薧膏清灝流地特形一毛酲方蘇於舊荄脈已奮乎枝柯津至有涯葉窮秋毫究舒厥盛蕚布嗷嘈散散黃英其情若何土階茅屋明良賡歌富貴不淫淫非吾曹禹食菲兮溝洫勞湯德且慙孰恣于遨艱難王業周琢而磨身弋綈兮道德麗心經理兮投厥戈曉露團團兮曷璿旒之孔多數君恍其胥㑹兮觀濟濟乎上袍坤裳之德弸中彪外兮藹相輝而蕩摩寂寥兮瀟灑屋籬兮山阿匪陶兮愛汝乃汝兮則陶蘂含章兮叢婆娑振振童子標格非凡志凌穹漢迹混蓬蒿展葉敷華玉宇澄虛青青襟佩以翔以翺崇臺顯榭低回苦思或謙光而抑抑柴開蓽户體胖心廣或渙發而囂囂或烟帷月幌緣詩太瘦鼓舞吟哦幽姿逸態層崖峻臯寧肥遁兮與决科千菲萬艷其藻固掞天庭兮名圈兮利牢貌爽而癯意肅而豪甘忍飢以香亷疇撑腹而臭叨芳譽籍籍聘書徴入警峭嵯峨有人若我異彼惡草誰賦離騷秦筆以刀嗟俗吏之滔滔者哉爾其厯蘭省步華館坐邃閣兮正祕書之舛訛審直辭而貶褒序庠潔己以為師揚德馨于俊髦徜徉容與乎金閨玉堂之內判花視草芬馥兮酷烈秀茂兮森羅霜臺凛凛胡斥非慆三軍出帥靡頑弗鏖作秋官於圜扉刑自嚴而不苛上公雖尊吐哺迎客誰飫豚羔賤貴者時吾常未始改兮委委他他如山如河太陽正照襟袍惟冷齪齪庸流微風生濤肌膚可萎氣焰詎可奪兮縱十九載於胸奴漢節不放而落旄重九良辰運來難逃舉世我趨榮傾敗荷惜哉寸晷容易蹉跎明日人心弃我粕糟然其衰也亦國老之皤皤諸年少其焉如太子安而不他是故厯代議養執爵余飲先萬乘而酕醄毛嬙麗姬鬒髮如雲選花插鬢吾不使遭讀書之眼翳膜生皆神入其眶耿如秋波或乃三枝兩簇散漫疏成騷人墨客適爾相過千株萬朵間以他卉王孫公子來往如梭繁盛滿園一望數畝良金幾籯敵此富有非天下之至貴孰能與於此哉萬物備我不藏不韜得之者性失之者魔愛玩不已三嗅而作吾執吾友邪揄咍呵遂相與言不知者從乎優婆采而獻諸蕃夷之摩訶知之者從乎孟軻而訪于酒糟也辭曰饑有饌兮丹霞拖渴有飲兮涼雨沱魂雖悅兮亡血臊精物何産於厚地兮全一清而豫操豫將辟穀兮矧雞鵝專餌汝兮亶至和寒無用兮衣蓑白日上升舟兮誰篙奚待尋乎海山兮六鼇徐福去兮空回艘彼不火食兮啖仙杏與蟠桃或棗或栗兮或蒲萄餐术之實不若餐其華之效頃兮俄乘羽化兮辭舊窠朝玉帝兮履鳬靴下視塵寰兮天􅌢慕我不及歎白頭兮悶搔梨花賦絪緼無涯孕精産荂九旬流華四月孔奢有匪浮誇花外之花爾其娟靜閒暇以窕窈兮敷舒幽貞其清皎兮恬淡瀟灑委蛇淳雅美不邇麗素不鄰野若帝厭爾衆芳之淫冶我宜錫其純嘏者耶濯濯春雨皓皓華月彼質而靜彼淡而悅或依于葛我所執兮或俯于藻我所拾兮祠庭閴寂樹英密祁祁僮僮如出而入奚素絢以比容徴彤管而名實夫大竅闔闢冶至靈甄無識蓋有暌性而合質者耶于何后妃兮似欣欣乎晴光余將歸寧兮眂滌濯乎衣裳流水之陽古公胥宇乃攜乃姜不容不粧后脫簮珥露諫宣王煙之蒼蒼青障于張解圍小郎三三兩兩寒窗之傍恍兮文德散帙于中宫左嬪摛思于椒房函如六齡之鄧衰若大家之班或乃暴風淫雨赴死無懼生兮貞女殁兮烈婦于嗟牡丹彼美芍藥胡為顔色可與娛樂丰丰褒姒艷艷驪姬君以為妍人以為媸花百其試豫兹懿哉辭曰匪冬而雪匪夜而月香山何人題我太真江之永矣不可泳思漢之廣矣不可方思桔橰賦漁溪之民兮桔橰一日不雨兮則勞土既薄兮沙石多水鑽鑽以下篩井凑凑而湧髙十日不雨兮因回數而損泉巽之愈低力其倍宣晝雖給於西園夕恐焦乎東田自甲至戊惟丙能眠夫婦蓬黧如蠻如猺太陽升兮畢炎燒嘉樹在前若秦皇漢武兮慕三神山之絶遼已而視瓶中之粟曽不足以禦來者之一朝思弗負於債家秋已竭其膏膋幸而禾稻成穗雷腹有充舉手加額慚荷元穹彼彎射虎之弓兮恨侯印之阻封援賦鵩之筆兮少為傅而曰窮潘嫌宦拙兮達早羽嘆天亡兮戰工長卿不文犢鼻皆可仲卿凡者牛衣足供作進學解者非韓愈耶昔有解嘲之揚雄言若亡憾兮意則由賜之不容斯可也世莫如漆園之憤悱兮羌託辭於苦空場屋之士戚戚未第乍登九品立俟隆崇紈袴之子厭厭肥甘率然一飯怒冠髮衝妖艷之女羞與醜婦共牢而食安得淮隂壯客甘絳灌之雷同者哉曰聖曰賢為顔為孔已雖樂以無尤人至今而屈訟造物者起笑而為辭曰賦汝厚兮責我深隨自然兮吾何心謂渠能兮昧矣謂渠素兮呻吟不若吝之兮均桔橰而後食庶無僥幸兮豈聞相怨之音惜别賦并序漁溪諸友丱角相從或相識乍離乍合今歲偶聚向時未生或初生者長成而丱角有逾壯齒矣二月始集講論未幾槐花將黃次第分散余世事已懶筆耕亦倦日嗜啜茶飲酒逍遙行坐締玩溪山之勝耳安能激厲諸君哉閒撰數辭强名之曰惜别賦場屋微名舉世營營有貴於己在人者輕人疑余兮未貢余已官而改京買臣行歌咄哉小生爾既朱輪孰與原憲終貧兮自得之榮況乎乘堅策肥旌旗擁路于青史兮無聲噫天垂月兮山吐雲青草死兮地懷根一枯一茂日代乎前皆仁氣之絪緼嘻哉諸君世務紛綸來歲之春想無暇留醉翁兮談天地之醇六經諸子百氏兮槩妙道之所存茍惟綴緝編類以得失為悲歡雖同居而白首亦奚由兮愈親樂軒集卷四
