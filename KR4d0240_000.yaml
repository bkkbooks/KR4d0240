body:
  text: 樂軒集别集類三宋提要臣等謹案樂軒集八卷宋陳藻撰藻字元潔福清人林亦之之弟子樂軒其自號也是集為其門人林希逸所編劉克莊序希逸竹溪詩集稱乾淳間艾軒林光朝始好深湛之思加煅煉之功有經嵗累月繕一章未就者盡生平所作不數卷能以約敵繁密勝疎精掩粗一傳而為網山林亦之再傳而為樂軒陳藻又稱艾軒歿門人盡散或更名他師獨網山樂軒篤守舊聞窮死不悔云云今觀集中所載各體詩俱以清刻新穎為長古文亦主於煅煉字句而不為奔放閎肆之作與艾軒網山二集體格相近雖其蹊逕太僻不免寒瘦之譏然在南宋諸家中實亦自成一派也乾隆四十五年七月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:c14934dec2a6b0281f9666c984826822a4e07d85a7187478b92494fe64aba502
