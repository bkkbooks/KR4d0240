body:
  text: 樂軒集巻二宋陳藻撰詩子從生兒席上作我身如浮雲出入無程期别君夫與婦戲約歸來時夫問婦何娠我卜生男兒出房拜阿姑我得酣酒巵遊脱城山屐香聞漁市炊雖無童僕遣若有音信知囘思一紀先君吟弄瓦詩亦開滿月筵我行適值之親交信有縁飲啄主者誰前言成䜟兆笑訝因陳詞詩法久無辭請繼闗雎為十九成數終隂偶配陽奇晉文在外還覇業一朝基伉儷今幾秋倒指恰如兹造化安排生必也非凡兒與景晦鄉閭好事喜人傳聞説當初賦斷弦得暇灌花花造化有方種藥藥神仙忽看脚下相隨處又是人間别様天數畝南園誰更管任他荒草欲平肩丘叔喬八十樂欲永千年愁難禁一夕大家於此且貪生八十孩兒題向額今朝門下慶相符坐有繡衣為上客況乎二弟古稀餘左酬右勸皆精力阿婆纔小三五秋卜㛰日者神無敵燈火鰲山弧矢晨姓名往往登仙籍借問人間見幾多荅云造化慳斯席丘子中生日名卿先達陳君舉年將三十登州補袖中有啓謝主文為縁場屋新推許斯翁自小學雕蟲性情樸直浮誰語旗鈴絶不到門庭却有兒郎能戰取髙名前日掛縣庠引此壽觴來獻父莫嫌小勝未當論知是敘封初步武中元連宿竹園劉叔嘉宅朝朝風雨過中元已熟之禾未易存正是忙時人却暇且偷佳節倒芳尊仲秋過盧北山子俞嘗新醖作白秫新收釀得紅洗鍋吹火煮油葱莫嫌傾出清和濁勝是嘗來辣且濃過盧北山西成課罷赴羣居中路誰家倦憇予恰見主人方早起簷前觀我所為書盧子俞幼孫晬日我與良翁似有縁命名與述戰龍天事忙不記垂弧旦恰到渠家遇晬筵小除過盧子俞作今夜人間是小除歸途迂曲訪一作過君居村深事簡携杯外閒把詩篇細卷舒賀劉叔猷為用甫納婦生平小我一全干十五字問揚雄難納幣孟冬猶丱角記得迎長方祀冠倒指新春五十七先春女嫁男㛰畢采真園裏東風囘主公無事花添色少貧嗟我老更貧塵累何時是了人況且郎君賦語神使我見兒秖欲嗔百丈書懷寄丘子深離騷休唱逐臣愁此曲思君可寄不百歳都來如過客一生大半似幽囚那堪泣玉空懷寶剛道雕蟲勝飯牛山館無聊春睡美日髙丈五正䝉頭紅泉明日還福清作獨坐無聊日已西忽經蒜嶺過漁溪一枝何處空歸去却整行裝羨鳥栖誦中庸端把中庸誦一篇眼前神物頓森然塵埃掃盡無他慮儘管髙樓自在眠梅野水橋邉幾樹梅歳寒欵欵向人開精神别帶陽春到造化勻分臘月來滿眼松筠皆臭味一天霜雪是胚胎看花逺地身還老買屋何年手自栽城山雲霧成佳景天明又幾囘忽攜詩句入别放畵圖開逺樹沉如立行歌去似來小舡衝雨過髙栁接湖栽月自孤青月臺呼恠石臺故園無夢想近擬築巖隈壺山二首萬古凌空孤拄軒百年那得此身存醉醒欲掃雲開眼興逸誰歸月掩門走遍莆陽隨處有遊觀天下見人論細瞻五岳神來舎旁聳諸山勢更尊逺看顛狂近轉迷有才老死便幽棲咄嗟萬里雲彌合昏黑孤城日正西北極河通千澗近中央天接兩傍低頓令病眼還蘇醒誰向他山更品題虎溪四圍山木合百磴屋簷重古穴成幽井疎林散曉峰響泉那更月啼鳥此無冬臺上朝朝看天邉處處供過延平書懷幾程便要買歸舟身在延平已倦遊但有菜羮供祭祀人生何必到融州紀夢自從弱冠為游子玉融丹井壺山市哦詩不用著工夫已謫牂柯四千里栁侯未五十羅池作刺史翰苑失詞華蛟龍怨泥滓我今四十貧無官六合飄零到融水來時三宿栁城村再拜前賢我如此才卑何怨嗟且述西征始奔走豈吾心跬步思桑梓江右湖湘抵桂林青山爭獻雙眸美青山縱好興不生萬斛覊愁懷抱裏夜長正好夢征夫何早起合眼見故鄉開眼知行李交朋無恨别親戚常孔邇天明同登途薄暮共棲止一更春酒熟街頭逢伯氏二更桑麻園仲氏談生理三更四更平時往還人見我早歸呼我喜五更茅店寒鄰鷄振吾耳忽驚身在竹床眠天外七閩何處是雙淚汪汪沾布被過臨川懷劉氏弟兄臨川幾日到長沙聞道黔南路更賖行見一村籬落好誰家此住憶君家過新喻四顧茫茫水接天逺山如卧白雲邉馬頭忽看孤峰起錯喜鄉關是目前宿衡陽一見行人一下車行人都説異鄉居别來閩嶺三千里夜宿衡陽夢寄書自哂且安愚分住天涯休問明朝買馬囘濠上有人留此老去年不到異鄉來題清暉樓兹樓名郡郭何處别林泉一水遥通蜀千崕利插天鸕鷀晴舞雪桑柘月生烟欲醉囊羞澁愁看度兩年融州西樓望山西樓門外數峯青合看芙蓉展看屏囘首東郊晴日出千人躍馬上天庭融州除夜寄福清劉九兄臘月牂柯三十日相思覔句上譙樓遥知今夜柴爐㑹説我無家更逺遊題融州城樓除却譙樓環廨舎蕭條市井客懷悲髙髙下下山無數淺淺深深江有時大布紅裙猺女著半規白扇野人持城中昨夜亡羊豕聞得誰家虎入籬融州望鄉故國來來八十程登樓迷却桂州城望鄉不分千山隔上趂金烏日裏行東樓夜望愁來無酒話無人明月樓中萬里身説與長江流水去汝今穿海入吾閩客中書事千載蠻風尚有存此來聞見不堪論猪膏澤髪湘南婦牛勃塗門嶺右村行客下床調瘴藥吏人抱甕灌蔬園豈無佳麗堪娯目别有淒凉只斷魂秋雨梅花五鼓城頭角吹向愁人枕前落一聲心膽碎無餘三聲兩聲那更作天明起坐壁為鄰簷外垂垂秋雨脚雨脚强髩毛弱若為一滴白幾莖縱使赤松猶老却冬日冬日何曾短寒更有許長紅爐那作伴白髪早還鄉舊酒誰賖飲新詩自冩藏故人思不見獨遶野梅香冬日融州絶句四隻漁舡叩板木幾家茅屋長兒孫天寒水淺江成路地僻人稀郭賽村東寧初夏得叔達書自都下來言去秋與鄉薦尋聞下第想就試上庠賦詩寄之天涯無伴只思渠知在杭州有故廬閩嶺秋空翔一鶚融江夏日煮雙魚合看髫齕登科去却有髭鬚落第初太學好還元祐體松峬莫便賦歸歟余融州生日牂柯相遇説長年一在公堂一洞天清逺使君黄石老西周柱史混元仙春日獨上譙樓日一廻春風桃李滿城開狂夫欲語無人聴呼取閒雲共酒盃融州東樓燈火無蠻市江山遶暗城漁舟闗柝響野燒日頭生雨闊千村暝天髙一月行夜樓多好景都不礙隂晴别融州兩年為客憶鄉關樽酒何時别此間今日移舟出城市多情却戀眼中山謁羅池廟友人余子畏嘗以詩戲余尾聨云我合焚香夜深坐等君頭白栁州來後余有東寧之役過栁州界謂前詩應於此矣及泛江東還謁羅池廟乃知行止前定平生不作羅池夢今日還來謁栁祠忽憶故人曽得句鬼神先我七年知真仙洞洞裏清溪可泛舟入觀洞府出髙丘老耼尸解今還在黄帝生前有此不滴乳解添無數巧攜燈何用不曾幽乾坤自大人身小拳石空中作勝遊寄呉提幹不見河南二十年若為再拜畫堂前來尋八桂𤓰期滿歸訪蒼梧蓮幕遷幸對夫人如母在喜看令子似公賢府僚共約黄花去業已還鄉種薄田别王司法維舟江㟁偶相鄰還與吾翁是故人顔貌不知今日改姓名方記舊時親少年壯筆生應貴白髪青衫今尚貧一笑羊城聊適意明朝話别兩酸辛題靜江桂林多洞府疑是館群仙四野皆平地千峰直上天舟行衆流江漸闊百恠石如生錯聴人聲閙空岩荅槳鳴過桂平嶺南太半尚鴻荒城壁空堅草莽長忽到潯州江上飲喜他風物近吾鄉過象州都無一物作生涯坊巷蕭條有幾家料得寒梅應悵恨滿城開作寂寥花過海豐梅花結子已紅青歸路猶愁一月程忽聴兒音鄉語熟不知方到海豐城除夜憶福清塘東諸友去年除夜作吟思除夜今年久别離幸喜此身貧却健柴爐更隔一年期喜次漳浦江灘已過瘴烟收野象逢人自縮頭官路十程如砥去舉杯先賀到漳州次韻林子衡惡夢之什昔人賡詩不賡韻韻恐不與事相關後人未得詩中趣賡得韻來誇甚難相逢索我一夢吟我欲可以呈孔顔若要夜間無惡夢朝朝心鏡好頻看憎吏行人逢胥吏靣唾欲擣其胸傷哉彼何罪造化生蛇蟲田宅世無有妻孥腹屢空人家詞訟起踊躍時命通天性本懷惡煎熬仍怕窮得錢即歡喜道理那能公州府珍寶饋縣官筵席供吏贓黥且死州縣多寛容三尺既虛設民寃訴髙穹髙穹不垂耳官吏屋俱豐訟田行樂軒世俗文不工場屋此生難遭逢百年餓死真可惜人命只在田畝中逺行直到西融州客裝收拾來歸休江灘象窟百無憂却䧟人心危險頭海上曾琚本亭户日在公門騁詞訴下鄉老嫗何大娘小郎遺業孤女當主婚老嫗貪聘資將女嫁與曾琚兒女將三十年及格依法賣田何所疑樂軒信己因信人豈識兩家俱不仁曾琚文約只要錢錢被何偷反訟田牙緋縣宰坐縣亭官是堂除豈不精老胥代判為縱横知縣依書那得平却監媒人宋五九備錢還我錢何有提㸃八州刑獄使重念八州寃曲事許人越訴榜通衢有狀不禁攔軺車軺車曉出平旦歸千人百人周四圍車中呼入使者笑觀感人多涕沾衣笑者笑何意吾不聰明渠不至感者泣何為赴愬容易殊曩時文書山積難稽考胥吏依前顔色好樂軒辭説如直弦外臺判下不改前州府監錢何嫗還吏人掌客生艱難因循六十日公事無了畢胥徒去復來索酒需財食樂軒一片杞菊懷遂令奔走生塵埃春雨吹散春風囘奇花異卉相迎開百千阿堵何足道鳴呼何媪豈人哉叱散胥徒吾不取抱琴横膝眠空齋阿凡初冠覔詩後人猶識前賢子祇是廼翁文字行為報阿凡今既冠莫教只託網山名愁夢天作閒愁催我老夜長猶自怕天明日中料想先成夢白上髭鬚數十莖戲題宏仲飲亭酒肆老去雖貧有酒壚秫田自種暫時沽閨中不解為慳婦猶問劉郎燕客無黄檗香爐峰黄檗寺前猶突兀祖師塔外别安排香爐好是中央小無數峰巒拱揖來叔達及第書走筆荅之君在臨安落第時我從融水寄君詩君歸莆陽為薦首我到漁溪餞君酒龍飛唱第才俊多健筆如君非甲科終然學問有知己姓名不記今卑矣人靈世上如豺虎我行厄運遭其侮白頭膠漆變須㬰一靣那知深肺腑書報青山七月還開書已覺開愁顔何時七月聴君話話我年來路轉囏擬卜居向來為客愛塘村幾度天邉入夢魂恰到塘村心已嬾不知何處立柴門冬日南谷讀書列岫開平野修墻隠宻林暗泉聞雨響寒日覺冬深眠底孤村近雲邉小樹侵何須錢買屋空寺足閒吟夜行偶成脚踏横塘外氏村忽瞻北極動歸魂貧姑生理凋零盡八十無兒住此門汝永寓大湖以歳歉還舍邂逅喜能為具賦詩贈之不到蓬窗恰一年空村作客遇飢還相逢喜有三飱色況是烹魚送酒船次韻呉推官見贈經理達翁家事之什紅泉風俗如鄒魯易合西華數載盟莫把肝腸隨世變常分儋石作人情哦詩豈詫文章好立教先須義利明戲問苦廬余子畏論交何重與何輕别舅氏表裏真容拜跪妨老夫拱揖謾焚香凋盡雙親一軰行兩世能留獨渭陽劣甥今年七十五花甲戊辰先戊午若非相見皆貧苦多少壚邉好歌舞贈故鄉人我家已破出他鄉如連如卓方阜昌豈料囊金隨後散一齊開鋪鬻文章我今濵死秖如許二友猶堪望軒翥從頭借問向來誰十室九人非舊主憶母蕭小八娘棄我去我生方始十三年如今七十零单五生死途分竟杳然客中夏夜即事上綴珠璣為屋蓋旁堆翡翠作屏風醉翁不見身貧賤卧向凉飈清露中久為塵事關懷因成一絶讀書得趣是神仙未若神仙斷火烟解把老夫理俗窟多時不放上青天戲簡宏仲劉九丈明月無長好晴空有晦時君家那與我頭白似新知丙子秋作今年時雨即時暘用向田園每恰當刈者不愁耕者喜似曽真宰與商量戲贈叔嘉七夕劉郎開小筵細君重九病方痊如何依舊煩纎手伏枕呻吟到冬首乃知貴骨真柔弱老夫此語非諧謔劉郎他日有公㕑節序無憂恣行樂憫劉家竹陳生將五十無地堪栽竹丈人門逕深兩面千竿緑營營不好事終日眉峰蹙二氣豈相宜此君覺塵俗琅玕訴失所願作陶家菊頼有徐卿兒往往知忘肉别蔡伯畛我本三山城下居誰人共讀艾軒書固無田宅堪歸老縱有文章適見踈黄石出門多俊逸白頭似子去鄉閭六經正説終茫昧不遣吾儕意氣舒客中懷劉九丘嫂貧中出罵言途窮非負昔時恩柴爐夜雨思君處歸共柴壚笑語喧贈䝉中田園尚少隠居難場屋勞勞未得官有酒羨君無一事餘糧猶足散孤寒讀史偶作二首千夫合作一賢人合數賢人是聖神莫道眼前無孔子一身散作萬千身由來識後技無他江左人材氣象豪道理明時身自俯見聞溢處趾空髙病眼寄子中連朝黒雨暫晴時山抹浮雲似畵眉貪看須㬰成底相不堪病眼怕風吹絶交贈伯巳二首忙忙終日暫談𤣥便聴閨房惡罵傳郎壻已灰題柱志親闈曾教斷機賢我讀人間饑死書君歸市肆有錙銖未聞良婦嗔嘉客分遣由來造化殊獨宿贈伯巳獨宿空齋夜雨流對床無味不如休論文似汝相逢少又被塵埃鋪席囚值事有感懷漁溪丘徳基紛紛場屋士聞見是空虛此老何曾學髙懷却有書對人惟靜黙有飯即安居説到榮華事生平不計渠姚晉卿溪閣行南院觀溪心已清縈紆更上閣中行西窗車馬市橋横東窗逺山雲霧生日斜沙石淺可數半夜轟雷驅猛雨農圃嘈嘈春水髙誰得身閒延客歌醉後下堦齊拍手長株矮樹排花栁主人更要雙眸寛去年拄杖尋長安一行一處狂呼去日日芳園大如許買地此多直幾金千屏萬障為墻堵西湖覽畢歸興忙川無大小人相羊清風明月淛江有酒亷魚賤輸吾鄉丘景運生孫叔南生子戲贈以詩二首齒序逢君我在前小兒學語舌初便如君未是生孫早若比他人晚數年兩人鄉曲是同年行坐相推日月先莫道丘公孫是女林郎初畵洗兒錢北風田園移主只丘墳他邑浮家每斷魂又向隣州為客久北風終夜夢柴門悼網山福清一半海為田創邑今垂五百年傖蠻世革儒風起西塘生在網山前介夫凛凛松筠操月魚識解文章到黄檗休誇十二峰鳥窠白嶼空飡過夢草醵關記末一句閒紬足之因以實其事早梅開後寒日暗天各穿百孔於杖頭欲放一時之野眼戲題絶句跋其後夢中只是醒時魂到老無他學著言好句特然生夢裏醒時却費斧斤痕試黜寄余景仁六經不合窮稍深入場下筆無知音吐辭從實理從是誰肯暮途生悔心臨漳推官韙我筆累舉悞疑當第一夜光暗擲那有知羣兒久處誰相識冬日贈宏仲愛君方始卜鄰居君又移家二里餘日裏苦無時刻到人情便覺往來踈風霜今歳攜盃幾淮淛明年解纜初兄嫂恩多因怨我語言雖惡敢嗔渠題黄子正易軒買屋移居已厯年北偏破漏更新椽忽於瓦下得易字鑄在小刀殊駭然主人懽喜檢玉篇易也音揚飛也箋儒生例作飛揚想符瑞壯之心益堅中間整頓安書案此物攜來呈我看神扶頃刻聰明開便解卜君門户換文形上下分兩刀刀字成三意如何昔人曾解三刀夢果把一麾時命遭正形五畫為五馬馬字依稀易字寫屋成一百六十秋來厯無從詢鐵冶漁溪市中多學者舉業棄之如土苴吟詩白日費工夫勸君自此知趨舎山水仙鄉出人物課書雖少多簮紱黄生雙眼自超奇莫遜此刀持待兒大書闊榜為易軒我更分毫細討論名場變易須容易不到艱難過禹門和琴薫閣閣倚琴薰誦子虛果然少壯入鄉書未遊唐殿哦詩句且把牙弦卧海隅有據論文須博浩無根話性合驅除擢犀拔象塵埃裏把出重看是捷途賀仲雨斗門濯錦江邉唱絶强孤青和者亦䕫襄厯年雖久地相逺在寢豈止升渠堂縱能帖石防頽㟁隨寓幽居供賞翫何如是處斗門雄莆壤萬農生賛歎莊周笑我機械深夏王見我須賞音莫道白頭猶未遇等勞一片活人心東林春晚作團欒四靣山我住一山裏相距能幾何開方祇百里日月出東西星辰運終始雲霞千萬狀烟雨無窮美誰云天體大仰看全於此窮儒治生計富盛誰與擬新晴麻麥秀擁戴峰巒起牡丹芍藥歇春意濃未巳野花悉力開白者真珠比薔薇及寶相爭鬭何綺靡藩籬成障幕村墟化城市世上豈寂寥俯仰昧斯㫖芙渠開欲來黄菊日可指寒梅即艮卦為魁向年底循環無了日物物從頭理康寜不相放卧病爾為爾平步樓主翁面貌不堪誇却是書中意味華因地成樓平似陟開林見樹直仍斜竟日清幽來佛寺有時問荅覺人家厭隨權勢貪情話筭殺肥雞愧滿車劉騂子初冠勉以詩汝爺十五初裹頭桂堂讀書從我遊汝今裹頭恰十五兩載東林就規矩我身只是前時命汝家歳久無衰盛族人快活羨汝爺汝又勝爺好情性瑩徹温柔好性情更須奮筆趨前程苦思入神方得句才如諸舅豈無甥叔嘉叔平既斬衰祝之以詩大兒年十四三五不知八源流於其母造化何太察小兒十歳周松竹不知對吾休置奴婢天遣供井碓我昔訓童多虛受人家怨愚智暗中分何以償渠願怪我自生兒寒窗仍未睹親朋責我苛誨之非莽鹵易教委虛談過庭秖取笑誰將蝴蜨飛勒作秋蟬呌廼舅久從游村巫語又聴身死欲葬埋發掘安可憑兩世太平山此墓何人主有房既分𣲖無息堪應舉農商攀不及矧乃君子儒生前聊爾爾没後真卑汚他日主我喪通經得兩郎試之以巨創整整到大祥願汝且康健送我歸山崗貧病正圖奔走救寒饑喘𠻳那堪力已疲意是無錢休買藥情知有命不求醫舊恩莫報空懷念新識相逢淡更宜多少貧交書畀我觸來又得一篇詩李氏園開方數畝地委曲多門墻咫尺闤闠間縈帶谿山傍入巷見顔子簞瓢想淒涼變化若夢中忽成摩詰莊主人華副實好遊心不荒引水灌花木築墻收稻粱六月無暑氣池臺足徜徉日斜留客浴清淨如寶坊迥迥過天象艷艷流坤光暫來吟未到留歸作者囊試黜題盧子俞所居門外冬青八九株去去株間各丈餘晚禾翦穂上囷儲黄藳堆兼緑葉居老夫晨出觀道腴攜笻邐迤來東廬世界在前君悟歟饑寒火宅飽華胥主人慰我下鄉書謝之飬生祇業儒雖然鄰酒欠錢沽粥飰可以供朝晡四壁雖然一物無半年聚稈為薪芻但愁賦税吏追呼鞭撻白丁省限踰歛石堂頭有老夫善排遣之語因答以詩本來無悶可消除生死窮通一任渠若到于今更排遣讀書何處是工夫伯温索詩賀令姊夫生朝一生開講度殘年紏者勞勞與辦錢恰似叢林充化士厯多世態得真禪忽教衰老親題䟽也且低垂敢自賢隨順却遭開眼白屈伸誰識草經𤣥官催租賦鞭笞急家乏樵蘇色語煎節序酒殽雖可廢妻孥溝壑恐將填不成底事空歸去别問良媒解倒懸樂内太深顔氏子生朝索賀郭郎篇謝丘伯已送酒芋二劉兄弟雖可語其如斛靣已尖量天差一婦各監係跬步不容越隄防羨餘置産晨夕忙老夫押花亦歸疆縉紳意態生堂堂苞苴來往堪嗟傷僕夫方遣邸音到疾足追囘他送將跏趺禪伯坐髙堂棒喝驚人宗㫖揚東家小兒廸功郎羞茶饋乳分名香先生方寸古書藏有時夜半開晶光温故知新滋味長欲傳對面無承當蹲鴟三十新酒芳忽然餉我非世常何以報之愧空囊百尺竿頭與翺翔男牽女挽細君狂不放逍遙隨老莊聴雨逋負關心糴穀償麥苖準擬貼春糧連宵不寢聴微雨錯喜簷花滴數行元夕同社衆攜燈上山謁神祠城中簫鼔閙鰲山燈火千村别一般今夕崔嵬行樂處向時模倣仰頭看聞雷先春三日已聞雷驅得長空一雨來莫問隂陽今失序磽園且喜趂犂開壽山種柑命名學圃數畝崎嶇帶寺傍水頽沙石古來荒住山有道神通現學圃成蹊鬼魅藏每隔歳華留碩果早從春事媚幽香黄橙緑橘真堪詠勝是長年引興長題林仲雨皦日庵詩仙庵未作與我話庵名素髪來為客朱甍始落成變風情性語皦日死生盟君老身猶健雌埋一劍横用余子畏韻其詩有警句云若知瓦礫真成道便覺珠璣不屬君少長城闉老一村平生好語不曽聞百年馬鬛空埋我三載鼇頭更祝君幸有鄰僧分隙地豈無座主識雄文須㬰忍死攜笻立更看崢嶸足躡雲聴呉畢聞講杜詩今夕行因效釋子偈體成一絶春秋皆貶事無褒莊子思之意若何下筆便為齊物論大家命酒且髙歌幽景山海吾鄉備移供不厭餐恰如行建劍幽景享多般樂軒集巻二
