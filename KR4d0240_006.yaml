body:
  text: 樂軒集卷六宋陳藻撰策問十二首河圖洛書天地之間大而慶雲景星細而麟鳳芝草其罕見者也故世以為竒嗟夫日月風霆非竒乎凡異毛之禽巧絶之花無非竒也惟所常見則不以為瑞河圖洛書其尤罕見蓋有天壤以來特一二出故世之儒者又謂本無是事特駕言神說爾之人也之語也其知造化之産孕百變者歟八卦設而文字興八卦之畫伏羲觀圖書而後作耶天以圖書而示伏羲伏羲通其義而為八卦或謂圖書㸃也卦畫亦㸃也今訛而為畫果然歟且今人之學易也有卦繇有爻辭有十翼又有注疏又有諸家講釋且以為難伏羲觀不言之㸃默而識之其故何耶神龜圖數四十有五其位八方而八卦果生於此否乎陽皆居正而隂處於隅不惟君臣夫婦之分昭然可見而君子小人之道亦較然於此矣龍馬書數五十五蓍果生於此乎其用止四十有九或謂不用者尊或謂用止於是而不可以損益其孰然歟五方五行之位其為生成之數固定也至於圖則金火易位或謂一為生數故順也一為尅數故逆也其然乎不然乎且圖闕其十又何也或謂縱橫皆十五則雖闕而未嘗不全或又以為土旺四季而縱橫皆十五正其妙㫖又果然乎或又以為合二者而全其數之百此為尤妙者也大傳謂易有四象則二者同時而出於伏羲之河洛固也班固謂禹治洪水天以洛書賜之而洪範以陳何耶或以大傳非夫子所作未足深信或以盡信書不如無書將孰從歟固之言蓋出於周書也豈洛書者一見於羲再見於禹乎惟其不一而止故夫子嘆河圖之不出於春秋也抑嘗思典籍既形而斯文猶出則造物者為贅矣夫誠哉是言也則夫子猶冀其祥何耶今人所傳之二者惟㸃爾班固言有六十五字然乎或且以其文有赤緑怪矣然如所問之前言則凡生於造化之間無非竒物而六十五字與夫赤緑者又奚足怪諸君其謂何易易性命之書也然以筮人正悔之說見於洪範而三易掌於周官之太卜春秋之世事驗歷歷焉得謂左氏之誣也哉漢有二京房皆出焦延夀之門延夀之師為孟喜或以為非喜而託之孟氏要之皆隂陽災變之學也孟喜之學自田王孫來施讎梁丘賀非同堂合席者耶賀以筮顯讎則不聞焉何也况漢言易者本田何何授丁寬寬授田王孫讎授張禹禹授彭宣施家有張彭之學丁也張也彭也胡為而非隂陽災變之學耶專言乎是時則有若髙相者自言出於丁將軍然乎否也又有所謂費直者長於卦筮故前漢之易有六家若施若孟若梁丘若京氏其立博士者四焉是以四家之易行於東都斬焉者費髙而已矣費髙之不傳何也孟也梁丘也京氏也實以占筮氣數工於當時至東都之諸儒傳其業者又不以是相髙何也既不以是相髙又何以謂之傳其業歟曹魏之季唱清談者王弼乃以易解行於世故兩晉易學雜佛老而言之也乎易有揲蓍之事精於筮數者何以謂之非易歟易有性命之奧入於𤣥妙者何以謂之非易歟故後之論易者非以道德之𤣥妙則以筮數之影響也不然則去斯二者而大易之藴何在書說經猶規矩權衡規矩權衡豈有二本哉漢儒明經各守師法師法爭鳴而經學晦矣書自伏生口傳之後有弟子歐陽生學自時厥後則有大夏侯勝學勝出於濟南張生伏生張生之師而勝又小夏侯建之師也建既師勝又師歐陽生之曽孫髙建似公其心也然又别之為一家嗚呼歐陽也大小夏侯也是伏生而下三授而三家矣又其傳也歐陽之後為平為陳大夏侯之後為孔為許小夏侯則有鄭張秦賈李氏之學夫張山拊事建者李尋鄭寬中等則事山拊者也寬中等守師法教授而洪範災異則尋之所獨好焉故孟堅作史尋不傳於儒林而置之京房翼奉之列也安國孔氏有古文尚書以今文讀之一傳而為兒寬都尉朝司馬遷是其傳說已行於當時矣而范史所載又以杜林得漆書古文尚書以示衛宏等而古文遂行是則林之所得又何書耶以書名家如前所述者衆矣今之所傳獨安國孔氏何也孟子曰盡信書不如無書吾於武成取二三策而已矣嗟夫書不可盡信况譊譊諸家之說乎雖然孟子之學未敢以望諸君且為我言漢儒之學詩詩情性也情性古今一也說詩者以今之情性求古之情性則奚有諸家之異同哉轅固齊人也其傳詩為齊詩浮丘伯亦齊人也魯人申公受之則為魯詩韓詩出於燕之韓嬰毛詩出於趙之毛萇其言不同故四者之名立四家之在漢莫盛於魯亦莫微於毛魯詩傳授有小江公大江公大江公之後有韋氏父子為宰相也於是乎有韋氏之學而又有張唐許氏之學其次則曰齊韓也齊詩有翼匡師伏之學况其初一傳已為夏侯始昌而其後蕭望之者又當世大儒欲不行得乎武帝詔求能為韓詩者而大臣蔡誼首出韓詩之行昉於此乎前此矣前此則帝胡詔而求之也蓋嬰在文帝時已為博士河內趙子則誼之師而誼之後且有王倉長孫之學此韓詩之所以行也毛詩自毛公而至陳俠蓋有五人焉俠在新室始為講學大夫而西都之立博士則三家而已矣衛宏生於東都之初受業於謝曼卿曼卿為訓而宏作序自是而後鄭衆賈逵亦受毛詩馬融有傳而鄭氏有箋毛氏之學興焉歷世滋久三家廢而毛氏獨行豈毛氏勝於三家而西都諸儒未及知歟抑其說之顯晦各有時歟嗚呼經術之明莫隆於本朝前輩諸公其說詩也雖不能免昔人之訓詁而其奧義隱㫖尋繹發越蓋有自得而不沿傳習者毛公或可束之髙閣故自歐蘇而下以解釋傳者蓋多矣其當耶未耶毋使後人視之又如今之視毛公則可也春秋傳春秋者五家鄒氏夾氏漢聞其人矣不聞其語也左氏姓名見於論語斯人也而有斯書也抑託其姓名者歟公羊榖梁漢聞其語矣未聞其人也第曰其學本於齊魯耳應劭之風俗通奚以知其皆在子夏之門歟或以髙為漢初人或以赤為秦孝公同時人然髙誠齊人也辭有登萊化我而已矣赤也何如俶其名元始其字阮孝緒之世録則云爾也董仲舒公孫𢎞善為公羊者也於是武帝尊其學俄而衛太子則反其所好焉宣帝情鍾於衛太子韋賢夏侯勝是又為魯之人時哉時哉榖梁之所由盛也左氏首出於張蒼之家是為漢世之先進者也賈誼貫公皆是其學胡為泯泯劉歆力擁而不前至都之東陳元賈逵服䖍輩始能挽而出之今雖與二家並行而人以左氏為巨擘抑物之顯晦各有時歟將久而後有定論歟三長五短劉知幾則左袒於丘明者也公羊墨守左氏膏肓榖梁廢疾何休之意亦以楚雖失之齊亦未為得歟發墨守針膏肓起廢疾若鄭𤣥者果足以發之針之起之歟左氏艷而富其失也誣榖梁清而婉其失也短公羊辨而裁其失也俗范寧之意則截長補短而後可為善矣夫四子之論未知其孰優然而較之杜預又如何也文中子以三傳作而春秋散盧同以三傳皆束之髙閣然歟抑大言歟唐之啖趙陸淳本朝前輩如孫如胡其於經傳得之淺深諸君必有權衡之論若以王金陵之言為解則非不為也是不能也禮記唐人裒緝禮學凡七十家而三禮行於世小戴氏其一也大戴有其書而不顯小戴列為六經豈非以中庸出於子思而緇衣出於公孫尼子乎况又有大學洙泗源流而曲禮檀弓又皆先秦古書也其他雖雜出漢儒然與是數篇並集而傳亦必其言有法而無纇之可指也今觀其辭或戾於五經或自相反覆豈可習之而不察歟凡天子禮樂諸侯竊而用之者春秋録以著其罪而見於詩書易禮者初無以是賜諸侯之文蓋名不正則言不順古無是事也必矣魯公世世郊禘乘天子之輅而揭其旗謂報功而有是賜著於明堂位然也而祭統亦云禮運又以魯之郊禘為非禮鄭氏且引卜不從之類以注之豈非惑於明堂位之說乎考其正文則謂杞宋當郊而魯不當郊然杞也宋也亦豈當行郊禮者乎此既戾於五經而又自相反覆者也唐虞官百夏商倍詳見於書而記則虞五十夏后氏百六官其屬各六十詳見於周禮而記則周三百春秋尊王黜伯而至孝近乎王至悌近乎伯非祭義有是言乎若是則王伯無醇疵之辨矣前所謂戾於五經者又此也曲禮四十强而仕學記九年大成則足以化民成俗學當其可之謂時時謂二十成人也二十而入太學九年而大成則三十可以仕矣奚限以四十耶禮自中出生於心祭統之言是也禮自外作言於樂記又何耶前所謂自相反覆者又此也且經解謂六經之教胥有失果有失矣其何以為六經乎差若毫釐繆以千里必學易者有是言也而遽舉以為易不知作此篇者何人而若是其凡耶儒行一篇其辭矜而不儉純似戰國人語决非夫子矣如哀公問仲尼燕居有是乎無是乎坊記表記子曰子言之者果且有言乎其未始有言乎否則清明在躬志氣如神似非漢人所能道孰謂非孔子閒居之言乎若夫言有不當於理者真以為出於聖人之口則恐為有子所笑若以漢儒决不能為聖人之言則有言者不必有德君子不以人廢言又不可以是書雜出他人而其言不得與六經並也諸君左右逢原必得於言意之表而不為紙上所膠者毋遜周禮周禮一書其所載者六官武王既黜殷命還歸在豐作周官或以為即此書也或以為次於立政之下者一篇而止耳今觀二書雖詳略不同而實相表裏豈六篇者其詳而一篇者其略耶以官作其書而以禮命之何耶凡一官之首必冠以民極二字極者道之正統禮者道之一端禮果足以盡道耶六經之目周官一數也既武帝以是為末世瀆亂不驗之書則當時表章以何者而足六經之數耶豈以儀禮耶若果然則後人經小戴而不經儀禮又何耶說者又以為始皇時疾周官搜焚獨悉是以隱藏百年雖自山巖屋壁入於祕府而五家之儒莫見夫六經等耳始皇特疾此書其亦有說歟始皇疾之而漢五家之儒亦莫得見於祕府何歟且是書也始於成帝之劉歆識其為周公致太平之迹永平杜子春一尊信之從而有鄭衆賈逵馬融康成迭出而和其唱其書遂與五經抗衡於世今讀其書捨注傳而難曉康成後出所存舊注因稱司農者衆稱大夫者興興者衆之子康成以其宗而别其稱後人而指康成則又以興為先鄭而彼為後鄭焉且成周之書而釋於東漢諸儒之手官名變矣器物改矣其為注傳意料臆度馬曰是而賈曰非先鄭曰然而後鄭曰否將孰為當耶賈公彥等其疏之去取可信耶不可信耶請先辨其書之所由來次及於傳說之當否以觀諸君聞見淵源之淺深周禮井田溝洫賦稅兵政周禮一書周公致太平之迹是也國以民為本民以食為天授田一事非王政之所先乎一夫受田百畝大司徒有不易一易再易之地率三夫而受六夫之地也遂人之田萊則率六夫而受十三夫之地焉此於六遂然也其在大司徒也則合以為六鄉而又曰凡造都鄙都鄙云者為王子弟公卿大夫之采地也且鄉遂都鄙受田之制不同必皆有說其說安在耶餘夫二十五畝孟子有是言也遂人言餘夫所受之田萊乃如正夫之數周禮孟子之言將何者為是耶夫有井田則有溝洫之制見於遂人匠人之職匠人所載溝洫澮之深廣有尺度遂人所載徑界涂道路則無闊狹之數焉注言容軌之多少不知其果然乎否也今以疏考之是三分為田而外一分往往為溝洫徑路之屬是又果然乎否也噫使其果然揆以人情未大戾也至九萬夫之地治溝澮者用五萬三千一百三十有六夫而出田稅者止三萬六千八百六十四夫耳治溝澮之夫幾二倍於出稅之夫此曷為可行者耶井田溝洫之制既明則賦稅當以次講孟子對畢戰井地之問請野九一而助國中什一使自賦蓋野外役事比國中為差少故其賦輕此周人通貢助行之而謂之徹也什一為常而重者無過九一耳載師所述輕者二十一重者至二十五將孟子欲反先王之制歟抑周禮非周公之全書歟田不耕者罰以三家之稅猶可也宅不毛者罰以二十五家之泉布無乃太甚已乎恐非先王酌中之法也分田制賦軍政之所由出今其有大可疑者夫王畿千里是為百同九百萬夫之地也宫室涂巷林麓等去其三分之一又以上中下地通之則大率受三百萬夫也天子六軍止用七萬五千人若不悉籍以為兵是四十夫出一兵悉籍以為兵而更畨用之則四十戰而後當一役况先王之世豈常有征戰之事哉然則古雖寓兵於民役實甚輕其法固善不可破也謂之大可疑何哉大司馬王六軍大國三軍次國二軍小國一軍王畿千里為百大國之地而與孟子所言萬乘千乘百乘者為何如以開方法準之則孟子所言萬取千千取百蓋亦以抵牾難用矣况周禮乎古人立言垂訓必皆可用之績有所㫖歸非茍然也諸君幸細紬尋之夏小正月令同異夏小正者夫子之杞而得之謂之夏時是固不當與禹貢並列於書乎月令出於秦人吕不韋之手乃以小戴盛行何哉然以二書而考之則夏小正誠不可與月令同日語也其文則酷似公榖孰謂夏人之為書乎或者前後二人之筆正如易六十四卦兼經傳而著之也且孟春昏參中二書則同也自是而下宜無所不同而夏小正之正月則桃華鷹為鳩啓蟄雷聞先乎一月之時何也月令開冰在仲春而小正之頒冰在三月是又後乎一月之時也在天者先而在人者後夫何如是之不可曉耶况四月越有大旱六月鷹始摯七月霖雨又似特記一年之異者也又二月丁亥釋菜釋菜而書之以丁亥孰謂非一年之史乎是雖可存不可與月令並行也昭昭矣雖然豈其然乎且四月初昏南門正十月初昏南門見南門者何亢之南北二大星也歲再見一正十月見於西則季春出火之前見于東矣然季秋內火而十月南門猶見何耶此又不可以記異言也或者失閏在斯年乎否也至於月令則尤大可疑者日中星鳥日永星火宵中星虗日短星昴兹非堯典記四仲之中星乎今也月令之仲春則昏弧中仲夏則昏亢中仲秋則昏牽牛中仲冬則昏東壁中抑何度數差逺之甚耶此天時然也人事尤不易考也禮有十二衣十二食非吕氏月令而云爾乎月令之衣食十有二而其實則四也而於一時輒三言之何耶否則十二衣十二食著見於何書也祀天祀五帝皆大裘而冕周禮司服未始隨方而異其色也吕不韋者又何必為是紛紛耶後世冕辨又從而别之蓋源流於此也隋人裴正所以深言其非是此書雖行於世抑亦無益於禮經者歟若以文字之工而傳則其文字與夏小正未可以低昂論也評至於此則一去一取詎容立判耶故竊讀二書也始若自有定論終願質疑於諸君太𤣥太𤣥之書當時後世有非之者亦有好之者諸家訓釋豈無可觀而老蘇之論二篇與夫所謂總例者吾特愛焉夫太𤣥之大約有二曰厯與筮而已矣一屴而加之以再去其旦夕經緯之占而從其詞之不可以前定竊謂子雲復生當斂袵於此矣然又不知子雲果爾乎至於𤣥也謂增以踦贏二贊則歲羡其四分日之一於是乎為一百八分之說使𤣥於二贊以其末者不為半日而止為四分日之一奚獨不可乎易有用九用六則三百八十六爻也𤣥以七百二十九而為七百三十一奚獨不可乎且老泉三方之算至三家之算皆九之半之若可也然自五十有四至十有八自十有八而至於六皆以三數也自六而至於三則兩之而已矣是亦出於有心而非其自然者安得如易數之天成乎日書斗書而月不書若可攻也然一歲之日成則月在其中矣五盡之說恐不足以窮子雲之辨竊試為揚子而諸君為老泉以相詰難奚若五星舜在璿璣玉衡以齊七政何以不言經星經者緯之所次也言乎經緯在其中矣緯星不可不講也周天之度或一歲或十有二歲或二十有八歲或自東西而出入或每歲十月一入太微要之皆有常數見伏留行順逆遲速一不合於厯度則清臺之上夜考而朝奏天子得以知闕失正五事而承天心也嗚呼星官厯翁之職豈非臺官御史之别乎嘗試論之甘石之外儒家緯星之說其詳見於張衡之賦大象諸葛亮之注與夫晉史之志天文其言五者休咎無以異於洪範五行傳之意劉向之言世以為拘平子孔明晉志之言拘乎否也昭明旬始之屬乃散五星之精經星之精不聞有其散者何也亂行失次變也或得之以為祥豈可不求其故歟漢唐之興同日事也一有東井之聚一止於鎮星之祥天文叶應小大不同有如是何也崔浩謂金水二星常附日而行按十月日在尾箕尾沒於西南而東井出於寅北斷然謂秉史筆者侈大其事以此二星豈背日而行哉噫此知常而不知變然浩深於天文其言亦必有指也尾箕之聚天寶之九載是時幸蜀之釁稔矣稽之漢册成敗相反何歟豈東井十月非五星所聚之次而尾箕所在正為五星之聚亦若厯家連珠之時歟將亂行失次直為變而不為祥歟抑五者所主不同其數微妙不可以一概論歟恭惟國朝觀文察變以和人道比者土星旅于上相之次宰臣抗疏求去九重不俞其請竊嘗求之貞觀十五年火星嘗逆于上相矣是歲也魏徵房𤣥齡方久盡彌縫之力㑹昌四年木星嘗掩于上相矣是歲李德裕正為名宰而杜悰方以賢節擢用大哉明天子之意豈非有見於此乎宰臣以是而求退又將何所見也晝誦書傳夜觀星宿是為儒生職業併析陳之以備有司之採擇五運六氣自有天地則五行氣數周流乎其間伏羲八卦虞夏典謨周人洪範皆不能捨是而言道也五運六氣之說始於黃帝無疑矣然細考其書則涉於日者之流而膚淺尤甚斯果黃帝君臣有是答問已乎且渾淪初分天下有目者之所不覩五天化氣所經之分孰先傳焉以八方分二十四位而甲巳化真土之說皆後世隂陽家之學堯舜姬孔所不道豈黃帝獨有是紛紛否耶况以五運而直六氣則羡其一少隂君火少陽相火火一行而二位其勢然爾其物果然歟噫是之與否窅𡨕莫辨未易决也所可得而辨者一歲而六氣一氣而六旬有竒小周者四歲而十有五則六甲盡而謂之大周矣於是乎一之以十幹配五音之所屬再之以十二支兼六氣之所屬三之以司天在泉左右間氣之位循環終始而立為太過不及平氣之别以司歲之吉凶是固然矣然厯家之算氣盡則日月之躔未畢日月之躔畢而五星之步未終章㑹統元蓋千萬歲而災祥詎可以次舉審如其說則六十數之外無他焉後乎甲子之未然以其然者知之矣若鬼㬰區若岐伯果何人哉而若是其膚淺也唐近代也且以其一二推之太宗元年關中飢二年天下蝗三年大水歲在丁亥戊子己丑也丁亥戊子皆天符而己丑為太乙天符則尤良歲也及四年庚寅則于運氣為太過而米斗三錢外户不閉行旅不齎糧抑何相反之甚耶𤣥宗之三年河南北之人流亡殆盡至四年仍為捕蝗之歲也乙卯丙辰亦曰天符而已矣開元之二十有八年庚辰其為堅成猶貞觀之庚寅也米斛直錢不滿二百絹匹如之海內安富而行者萬里不持寸兵亦何相反之甚耶然則五運六氣之說是果荒唐不足信矣其戰國談天如鄒衍之徒為之非耶雖然太宗遼水之敗是為乙巳蓋不及者天寶岷山之幸非丙申歟蓋流衍者也不可謂無是說也或者謂運氣有一定之符而人主感召之機自有移易化工之理歲休而咎歲咎而休機在人主不在運氣則誠有是說也然乎樂軒集卷六
